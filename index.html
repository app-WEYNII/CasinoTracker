/* ═══ DASHBOARD MODULE ═══ */
const DSH={
  range:'all', /* 'week' | 'month' | 'year' | 'all' */
  tab:'global', /* 'global' | 'slots' | 'bj' */

  async init(){await this.render()},

  /* Filter sessions/hands by selected range */
  _filterByRange(items,dateField){
    if(this.range==='all')return items;
    const now=new Date();
    let cutoff=new Date(0);
    if(this.range==='week'){cutoff=new Date(now);cutoff.setDate(cutoff.getDate()-7)}
    else if(this.range==='month'){cutoff=new Date(now);cutoff.setMonth(cutoff.getMonth()-1)}
    else if(this.range==='year'){cutoff=new Date(now);cutoff.setFullYear(cutoff.getFullYear()-1)}
    const cutoffStr=cutoff.toISOString().split('T')[0];
    return items.filter(it=>{
      if(dateField==='ts'){return (it.ts||0)>=cutoff.getTime()}
      return (it[dateField]||'')>=cutoffStr;
    });
  },

  async _gatherData(){
    const allSlotSess=await db.slotSessions.toArray();
    const allSlotPlays=await db.slotPlays.toArray();
    const allBjSess=await db.bjSessions.toArray();
    const allBjHands=await db.bjHands.toArray();
    const allBhSess=await db.bhSessions.toArray();
    const allBhBonuses=await db.bhBonuses.toArray();

    const slotSess=this._filterByRange(allSlotSess.filter(s=>s.cashout!=null),'date');
    const slotSessIds=new Set(slotSess.map(s=>s.id));
    const slotPlays=allSlotPlays.filter(p=>slotSessIds.has(p.sessionId));

    const bjSess=this._filterByRange(allBjSess.filter(s=>s.cashout!=null),'date');
    const bjSessIds=new Set(bjSess.map(s=>s.id));
    const bjHands=allBjHands.filter(h=>bjSessIds.has(h.sessionId));

    const bhSess=this._filterByRange(allBhSess.filter(s=>s.cashout!=null),'date');
    const bhSessIds=new Set(bhSess.map(s=>s.id));
    const bhSessByIdAll={};allBhSess.forEach(s=>{bhSessByIdAll[s.id]=s});
    /* For machine stats / ranking we want bonuses from sessions in range (closed only) */
    const bhBonuses=allBhBonuses.filter(b=>bhSessIds.has(b.sessionId));
    /* But also for stat purposes we may want all opened bonuses regardless of session status */
    const bhBonusesAllOpened=allBhBonuses.filter(b=>{
      const s=bhSessByIdAll[b.sessionId];if(!s)return false;
      if(this.range==='all')return true;
      return (s.date||'').slice(0,10)>=this._cutoffStr();
    });

    return{slotSess,slotPlays,bjSess,bjHands,bhSess,bhBonuses,bhBonusesAllOpened,bhSessByIdAll,allSlotSess,allBjSess,allBhSess};
  },

  _cutoffStr(){
    if(this.range==='all')return'';
    const now=new Date();let cutoff=new Date(now);
    if(this.range==='week')cutoff.setDate(cutoff.getDate()-7);
    else if(this.range==='month')cutoff.setMonth(cutoff.getMonth()-1);
    else if(this.range==='year')cutoff.setFullYear(cutoff.getFullYear()-1);
    return cutoff.toISOString().split('T')[0];
  },

  _slotStats(sess,plays){
    const deposits=sess.reduce((s,x)=>s+(x.deposit||0),0);
    const cashouts=sess.reduce((s,x)=>s+(x.cashout||0),0);
    const wagered=plays.reduce((s,p)=>s+playWager(p),0);
    const totalSpins=plays.reduce((s,p)=>s+playSpins(p),0);
    const totalBonuses=plays.reduce((s,p)=>s+(p.bonuses||[]).length,0);
    const allMultis=[];plays.forEach(p=>(p.bonuses||[]).forEach(b=>{if(b.multiplier)allMultis.push(b.multiplier)}));
    const profit=cashouts-deposits;
    return{
      sessions:sess.length,
      deposits,cashouts,wagered,profit,
      rtp:wagered>0?((wagered+profit)/wagered*100):0,
      roi:deposits>0?(profit/deposits*100):0,
      avgSession:sess.length?profit/sess.length:0,
      bestSession:sess.length?Math.max(...sess.map(s=>(s.cashout||0)-(s.deposit||0))):0,
      worstSession:sess.length?Math.min(...sess.map(s=>(s.cashout||0)-(s.deposit||0))):0,
      totalSpins,totalBonuses,
      bonusFreq:totalSpins>0?(totalBonuses/totalSpins*100):0,
      avgMulti:allMultis.length?allMultis.reduce((a,b)=>a+b,0)/allMultis.length:0,
      maxMulti:allMultis.length?Math.max(...allMultis):0
    };
  },

  _bjStats(sess,hands){
    const deposits=sess.reduce((s,x)=>s+(x.deposit||0),0);
    const cashouts=sess.reduce((s,x)=>s+(x.cashout||0),0);
    const wagered=hands.reduce((s,h)=>s+(h.bet||0)+(h.pp?h.pp.bet:0)+(h.tp?h.tp.bet:0),0);
    const profit=cashouts-deposits;
    let W=0,L=0,P=0,BJ=0,SR=0,checkable=0,goodMoves=0;
    hands.forEach(h=>{
      if(h.result==='W')W++;else if(h.result==='BJ'){BJ++;W++}else if(h.result==='L')L++;else if(h.result==='P')P++;else if(h.result==='SR')SR++;
      if(h.recommended&&h.action&&h.recommended!=='BLACKJACK'&&h.recommended!=='BUST'){checkable++;if(h.recommended===h.action)goodMoves++}
    });
    const dec=W+L+SR;
    return{
      sessions:sess.length,
      deposits,cashouts,wagered,profit,
      roi:deposits>0?(profit/deposits*100):0,
      avgSession:sess.length?profit/sess.length:0,
      bestSession:sess.length?Math.max(...sess.map(s=>(s.cashout||0)-(s.deposit||0))):0,
      worstSession:sess.length?Math.min(...sess.map(s=>(s.cashout||0)-(s.deposit||0))):0,
      totalHands:hands.length,
      W,L,P,BJ,SR,
      winrate:dec>0?(W/dec*100):0,
      bjRate:hands.length>0?(BJ/hands.length*100):0,
      pushRate:hands.length>0?(P/hands.length*100):0,
      adherence:checkable>0?(goodMoves/checkable*100):null,
      adherenceCount:goodMoves+'/'+checkable,
      avgBet:hands.length>0?hands.reduce((s,h)=>s+(h.bet||0),0)/hands.length:0
    };
  },

  /* Hunt aggregate stats */
  _huntStats(sess,bonuses){
    const deposits=sess.reduce((s,x)=>s+(x.deposit||0),0);
    const cashouts=sess.reduce((s,x)=>s+(x.cashout||0),0);
    const profit=cashouts-deposits;
    const opened=bonuses.filter(b=>b.payout!=null);
    const totalCost=bonuses.reduce((s,b)=>s+(b.cost||0),0);
    const totalPayout=opened.reduce((s,b)=>s+(b.payout||0),0);
    const multis=opened.filter(b=>b.cost>0).map(b=>b.payout/b.cost);
    return{
      sessions:sess.length,
      deposits,cashouts,profit,
      roi:deposits>0?(profit/deposits*100):0,
      totalBonuses:bonuses.length,openedBonuses:opened.length,
      totalCost,totalPayout,
      huntRTP:totalCost>0?(totalPayout/totalCost*100):0,
      avgMulti:multis.length?multis.reduce((a,b)=>a+b,0)/multis.length:0,
      maxMulti:multis.length?Math.max(...multis):0,
      bestSession:sess.length?Math.max(...sess.map(s=>(s.cashout||0)-(s.deposit||0))):0,
      worstSession:sess.length?Math.min(...sess.map(s=>(s.cashout||0)-(s.deposit||0))):0
    };
  },

  /* Build daily P/L series for sparkline. Returns [{date, pl}] sorted. */
  _dailySeries(slotSess,bjSess,bhSess){
    const byDate={};
    const add=arr=>arr.forEach(s=>{if(s.cashout==null)return;const k=(s.date||'').slice(0,10);byDate[k]=(byDate[k]||0)+((s.cashout||0)-(s.deposit||0))});
    add(slotSess);add(bjSess);add(bhSess||[]);
    return Object.keys(byDate).sort().map(d=>({date:d,pl:byDate[d]}));
  },

  /* SVG cumulative P/L sparkline */
  _renderCumChart(daily){
    if(daily.length<2)return'';
    const cum=[];let acc=0;daily.forEach(d=>{acc+=d.pl;cum.push(acc)});
    const W=320,H=100,PR=8;
    const min=Math.min(0,...cum),max=Math.max(0,...cum),range=max-min||1;
    const x=i=>PR+(W-2*PR)*(i/(cum.length-1||1));
    const y=v=>PR+(H-2*PR)*(1-(v-min)/range);
    const zeroY=y(0);
    const path=cum.map((v,i)=>(i===0?'M':'L')+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' ');
    const last=cum[cum.length-1];
    const col=last>=0?'var(--accent)':'var(--red)';
    const area=path+' L '+x(cum.length-1).toFixed(1)+' '+zeroY.toFixed(1)+' L '+x(0).toFixed(1)+' '+zeroY.toFixed(1)+' Z';
    return'<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="width:100%;height:100px;display:block"><line x1="'+PR+'" y1="'+zeroY.toFixed(1)+'" x2="'+(W-PR)+'" y2="'+zeroY.toFixed(1)+'" stroke="var(--border)" stroke-width="1" stroke-dasharray="2 3"/><path d="'+area+'" fill="'+col+'" fill-opacity=".15"/><path d="'+path+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  },

  _renderHeatmap(daily){
    const N=12;
    const today=new Date();today.setHours(0,0,0,0);
    const dow=(today.getDay()+6)%7;
    const monday=new Date(today);monday.setDate(today.getDate()-dow);
    const start=new Date(monday);start.setDate(monday.getDate()-(N-1)*7);
    const byDate={};daily.forEach(d=>byDate[d.date]=d.pl);
    const cells=[];
    for(let w=0;w<N;w++)for(let d=0;d<7;d++){
      const dt=new Date(start);dt.setDate(start.getDate()+w*7+d);
      const iso=dt.toISOString().split('T')[0];
      const pl=byDate[iso];
      const future=dt>today;
      let bg='var(--bg-input)';
      if(!future&&pl!=null){
        if(pl>0){const i=Math.min(1,pl/200);bg='color-mix(in srgb,var(--accent) '+(20+i*60).toFixed(0)+'%,transparent)'}
        else if(pl<0){const i=Math.min(1,-pl/200);bg='color-mix(in srgb,var(--red) '+(20+i*60).toFixed(0)+'%,transparent)'}
      } else if(future){bg='transparent'}
      cells.push({iso,pl,bg});
    }
    let html='<div class="dsh-heatmap">';
    cells.forEach(c=>{
      const tip=c.iso+(c.pl!=null?' · '+(c.pl>=0?'+':'')+c.pl.toFixed(0):'');
      html+='<div class="dsh-heat-cell" style="background:'+c.bg+'" title="'+tip+'"></div>';
    });
    html+='</div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:10px;color:var(--text-muted)"><span>'+N+' dernières semaines</span><div style="display:flex;align-items:center;gap:4px">Perte<div style="width:12px;height:12px;background:color-mix(in srgb,var(--red) 70%,transparent);border-radius:2px"></div><div style="width:12px;height:12px;background:var(--bg-input);border-radius:2px"></div><div style="width:12px;height:12px;background:color-mix(in srgb,var(--accent) 70%,transparent);border-radius:2px"></div>Gain</div></div>';
    return html;
  },

  /* === MAIN RENDER === */
  async render(){
    const el=document.getElementById('viewDashboard'),c=await S.get('currency')||'EUR';
    const data=await this._gatherData();
    const{slotSess,slotPlays,bjSess,bjHands,bhSess,bhBonuses,bhBonusesAllOpened,bhSessByIdAll}=data;
    const slot=this._slotStats(slotSess,slotPlays);
    const bj=this._bjStats(bjSess,bjHands);
    const hunt=this._huntStats(bhSess,bhBonuses);

    let html='<div class="view-inner"><h2 class="view-title">Statistiques</h2>';

    /* Range selector */
    html+='<div class="settings-card" style="padding:6px;display:flex;gap:4px;margin-bottom:var(--space-sm)">'+
      [['week','7j'],['month','30j'],['year','12m'],['all','Tout']].map(([k,l])=>'<button class="btn '+(this.range===k?'btn-primary':'btn-outline')+'" data-range="'+k+'" style="flex:1;padding:8px 0;font-size:13px;font-weight:700">'+l+'</button>').join('')+
      '</div>';

    /* Sub-tabs */
    html+='<div class="settings-card" style="padding:6px;display:flex;gap:4px">'+
      [['global','💼 Global'],['slots','🎰 Slots'],['bj','🃏 BJ']].map(([k,l])=>'<button class="btn '+(this.tab===k?'btn-primary':'btn-outline')+'" data-tab="'+k+'" style="flex:1;padding:8px 0;font-size:13px;font-weight:700">'+l+'</button>').join('')+
      '</div>';

    const totalSessions=slot.sessions+bj.sessions+hunt.sessions;
    if(totalSessions===0){
      html+='<div class="settings-card" style="text-align:center;padding:var(--space-xl)"><p class="text-muted">Aucune donnée sur cette période.</p></div></div>';
      el.innerHTML=html;this._bind();return;
    }

    /* Dispatch to tab renderer */
    if(this.tab==='global')html+=this._renderGlobal(data,slot,bj,hunt,c);
    else if(this.tab==='slots')html+=this._renderSlots(data,slot,hunt,c);
    else if(this.tab==='bj')html+=this._renderBJ(data,bj,c);

    html+='</div>';
    el.innerHTML=html;
    this._bind();
  },

  /* === GLOBAL TAB === */
  _renderGlobal(data,slot,bj,hunt,c){
    const{slotSess,bjSess,bhSess}=data;
    const totalDep=slot.deposits+bj.deposits+hunt.deposits;
    const totalCash=slot.cashouts+bj.cashouts+hunt.cashouts;
    const totalProfit=totalCash-totalDep;
    const totalWager=slot.wagered+bj.wagered+(hunt.totalCost||0);
    const globalRTP=totalWager>0?((totalWager+totalProfit)/totalWager*100):0;
    const globalROI=totalDep>0?(totalProfit/totalDep*100):0;
    const totalSessions=slot.sessions+bj.sessions+hunt.sessions;
    const daily=this._dailySeries(slotSess,bjSess,bhSess);
    const winDays=daily.filter(d=>d.pl>0).length;
    const loseDays=daily.filter(d=>d.pl<0).length;
    const dayWinRate=daily.length>0?(winDays/daily.length*100):0;

    let html='<div class="settings-card"><h3 class="card-title">💼 Vue globale</h3>';
    html+='<div class="stat-grid">';
    html+='<div class="stat-box"><div class="stat-value '+(totalProfit>=0?'positive':'negative')+'">'+fC(totalProfit,c)+'</div><div class="stat-label">P/L net</div></div>';
    html+='<div class="stat-box"><div class="stat-value">'+fA(totalDep,c)+'</div><div class="stat-label">Dépôts</div></div>';
    html+='<div class="stat-box"><div class="stat-value">'+fA(totalCash,c)+'</div><div class="stat-label">Cashouts</div></div>';
    html+='<div class="stat-box"><div class="stat-value '+(globalROI>=0?'positive':'negative')+'">'+(globalROI>=0?'+':'')+globalROI.toFixed(1)+'%</div><div class="stat-label">ROI</div></div>';
    html+='</div>';
    let rows='';
    if(totalWager>0)rows+='<div class="rtp-row"><div class="rtp-machine">Total misé</div><div class="rtp-values"><span class="stat-value-sm">'+fA(totalWager,c)+'</span><span class="text-muted text-sm">×'+(totalDep>0?(totalWager/totalDep).toFixed(1):'—')+' du dépôt</span></div></div>';
    if(totalWager>0)rows+='<div class="rtp-row"><div class="rtp-machine">RTP global</div><div class="rtp-values"><span class="stat-value-sm '+SS.rtpClass(globalRTP)+'">'+globalRTP.toFixed(2)+'%</span></div></div>';
    rows+='<div class="rtp-row"><div class="rtp-machine">Sessions</div><div class="rtp-values"><span class="stat-value-sm">'+totalSessions+'</span><span class="text-muted text-sm">'+slot.sessions+'🎰 · '+hunt.sessions+'🎯 · '+bj.sessions+'🃏</span></div></div>';
    if(daily.length>0)rows+='<div class="rtp-row"><div class="rtp-machine">Jours gagnants</div><div class="rtp-values"><span class="stat-value-sm '+(dayWinRate>=50?'positive':'negative')+'">'+dayWinRate.toFixed(0)+'%</span><span class="text-muted text-sm">'+winDays+'W · '+loseDays+'L</span></div></div>';
    html+=rows+'</div>';

    /* Cumulative chart */
    if(daily.length>=2){
      html+='<div class="settings-card"><h3 class="card-title">📈 P/L cumulé</h3>'+this._renderCumChart(daily)+'</div>';
    }

    /* Heatmap */
    if(daily.length>0){
      html+='<div class="settings-card"><h3 class="card-title">🗓️ Activité</h3>'+this._renderHeatmap(daily)+'</div>';
    }

    /* Split bar slot/hunt/bj */
    const segs=[];
    if(slot.sessions>0)segs.push({lab:'🎰',profit:slot.profit});
    if(hunt.sessions>0)segs.push({lab:'🎯',profit:hunt.profit});
    if(bj.sessions>0)segs.push({lab:'🃏',profit:bj.profit});
    if(segs.length>=2){
      const total=segs.reduce((s,x)=>s+Math.abs(x.profit),0)||1;
      html+='<div class="settings-card"><h3 class="card-title">⚖️ Répartition P/L</h3>';
      html+='<div style="display:flex;height:24px;border-radius:6px;overflow:hidden;background:var(--bg-input);margin-bottom:8px">';
      segs.forEach((s,i)=>{
        const pct=Math.abs(s.profit)/total*100;
        const col=s.profit>=0?'var(--accent)':'var(--red)';
        html+='<div style="width:'+pct.toFixed(1)+'%;background:'+col+';opacity:'+(0.6+0.4*((segs.length-i)/segs.length)).toFixed(2)+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff">'+s.lab+' '+pct.toFixed(0)+'%</div>';
      });
      html+='</div>';
      html+='<div style="display:flex;justify-content:space-between;font-size:12px;flex-wrap:wrap;gap:8px">';
      segs.forEach(s=>{html+='<span>'+s.lab+' '+fC(s.profit,c)+'</span>'});
      html+='</div></div>';
    }
    return html;
  },

  /* === SLOTS TAB === */
  _renderSlots(data,slot,hunt,c){
    const{slotPlays,bhBonusesAllOpened,bhSess,bhSessByIdAll}=data;
    let html='';
    if(slot.sessions===0&&hunt.sessions===0){
      return'<div class="settings-card" style="text-align:center;padding:var(--space-xl)"><p class="text-muted">Aucune donnée slots / hunt sur cette période.</p></div>';
    }

    /* Slot core stats */
    if(slot.sessions>0){
      html+='<div class="settings-card"><h3 class="card-title">🎰 Slots</h3>';
      html+='<div class="stat-grid">';
      html+='<div class="stat-box"><div class="stat-value '+(slot.profit>=0?'positive':'negative')+'">'+fC(slot.profit,c)+'</div><div class="stat-label">Net</div></div>';
      html+='<div class="stat-box"><div class="stat-value">'+slot.sessions+'</div><div class="stat-label">Sessions</div></div>';
      if(slot.wagered>0)html+='<div class="stat-box"><div class="stat-value '+SS.rtpClass(slot.rtp)+'">'+slot.rtp.toFixed(1)+'%</div><div class="stat-label">RTP</div></div>';
      html+='<div class="stat-box"><div class="stat-value '+(slot.avgSession>=0?'positive':'negative')+'">'+fC(slot.avgSession,c)+'</div><div class="stat-label">Moy./session</div></div>';
      html+='</div>';
      let r='';
      r+='<div class="rtp-row"><div class="rtp-machine">Best / Worst session</div><div class="rtp-values"><span class="stat-value-sm positive">'+fC(slot.bestSession,c)+'</span><span class="stat-value-sm negative">'+fC(slot.worstSession,c)+'</span></div></div>';
      if(slot.totalSpins>0)r+='<div class="rtp-row"><div class="rtp-machine">Spins / Bonus</div><div class="rtp-values"><span class="stat-value-sm">'+slot.totalSpins.toLocaleString('fr-FR')+'</span><span class="stat-value-sm">'+slot.totalBonuses+'</span></div></div>';
      if(slot.bonusFreq>0)r+='<div class="rtp-row"><div class="rtp-machine">Fréquence bonus</div><div class="rtp-values"><span class="stat-value-sm">1 / '+(slot.bonusFreq>0?Math.round(100/slot.bonusFreq):'∞')+' spins</span><span class="text-muted text-sm">'+slot.bonusFreq.toFixed(2)+'%</span></div></div>';
      if(slot.maxMulti>0)r+='<div class="rtp-row"><div class="rtp-machine">Multi moy / max</div><div class="rtp-values"><span class="stat-value-sm">x'+slot.avgMulti.toFixed(1)+'</span><span class="stat-value-sm positive">x'+slot.maxMulti.toFixed(0)+'</span></div></div>';
      html+=r+'</div>';
    }

    /* Hunt summary */
    if(hunt.sessions>0){
      html+='<div class="settings-card"><h3 class="card-title">🎯 Bonus Hunt</h3>';
      html+='<div class="stat-grid">';
      html+='<div class="stat-box"><div class="stat-value '+(hunt.profit>=0?'positive':'negative')+'">'+fC(hunt.profit,c)+'</div><div class="stat-label">Net</div></div>';
      html+='<div class="stat-box"><div class="stat-value">'+hunt.sessions+'</div><div class="stat-label">Hunts</div></div>';
      html+='<div class="stat-box"><div class="stat-value">'+hunt.openedBonuses+'</div><div class="stat-label">Bonus ouverts</div></div>';
      if(hunt.totalCost>0)html+='<div class="stat-box"><div class="stat-value '+SS.rtpClass(hunt.huntRTP)+'">'+hunt.huntRTP.toFixed(1)+'%</div><div class="stat-label">RTP hunts</div></div>';
      html+='</div>';
      let r='';
      r+='<div class="rtp-row"><div class="rtp-machine">Best / Worst hunt</div><div class="rtp-values"><span class="stat-value-sm positive">'+fC(hunt.bestSession,c)+'</span><span class="stat-value-sm negative">'+fC(hunt.worstSession,c)+'</span></div></div>';
      if(hunt.maxMulti>0)r+='<div class="rtp-row"><div class="rtp-machine">Multi moy / max</div><div class="rtp-values"><span class="stat-value-sm">'+hunt.avgMulti.toFixed(2)+'×</span><span class="stat-value-sm positive">'+hunt.maxMulti.toFixed(1)+'×</span></div></div>';
      html+=r+'</div>';
    }

    /* Top bonus ranking */
    const ranking=SS.bonusRanking(bhBonusesAllOpened,bhSessByIdAll);
    if(ranking.length>0){
      const top=ranking.slice(0,5);
      const flop=ranking.length>5?ranking.slice(-3).reverse():[];
      html+='<div class="settings-card"><h3 class="card-title">🏆 Top bonus</h3>';
      html+=top.map((b,i)=>{
        const medal=i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':'';
        return'<div class="rtp-row"><div class="rtp-machine">'+medal+esc(trn(b.machine||'?',16))+'<span class="text-muted text-sm"> · '+b.mult.toFixed(1)+'×</span></div><div class="rtp-values"><span class="text-muted text-sm">'+fA(b.cost||0,c)+' → '+fA(b.payout,c)+'</span><span class="stat-value-sm positive">'+fC(b.pnl,c)+'</span></div></div>';
      }).join('');
      if(flop.length){
        html+='<div class="separator"></div><h3 class="card-title" style="font-size:12px;text-transform:uppercase;color:var(--text-muted)">💩 Flop</h3>';
        html+=flop.map(b=>'<div class="rtp-row"><div class="rtp-machine">'+esc(trn(b.machine||'?',16))+'<span class="text-muted text-sm"> · '+b.mult.toFixed(1)+'×</span></div><div class="rtp-values"><span class="text-muted text-sm">'+fA(b.cost||0,c)+' → '+fA(b.payout,c)+'</span><span class="stat-value-sm negative">'+fC(b.pnl,c)+'</span></div></div>').join('');
      }
      html+='</div>';
    }

    /* Top machines (slots + hunt merged) */
    const byMach=SS.byMachWithHunt(slotPlays,bhBonusesAllOpened);
    if(byMach.length){
      byMach.sort((a,b)=>b.profit-a.profit);
      const top=byMach.slice(0,5),bot=byMach.length>5?byMach.slice(-3).reverse():[];
      html+='<div class="settings-card"><h3 class="card-title">🎰 Top machines</h3>';
      html+=top.map((m,i)=>{
        const medal=i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':'';
        const huntBadge=m.huntCount>0?'<span class="text-muted text-sm"> · '+m.huntCount+'🎯</span>':'';
        const rtpStr=m.totalBet>0?'<span class="stat-value-sm '+SS.rtpClass(m.rtp)+'">'+m.rtp.toFixed(0)+'%</span>':'';
        return'<div class="rtp-row"><div class="rtp-machine">'+medal+esc(trn(m.name,18))+'<span class="text-muted text-sm"> · '+m.bonuses+' bonus</span>'+huntBadge+'</div><div class="rtp-values">'+rtpStr+'<span class="stat-value-sm '+(m.profit>=0?'positive':'negative')+'">'+fC(m.profit,c)+'</span></div></div>';
      }).join('');
      if(bot.length){
        html+='<div class="separator"></div><h3 class="card-title" style="font-size:12px;text-transform:uppercase;color:var(--text-muted)">❄️ À éviter</h3>';
        html+=bot.map(m=>{
          const rtpStr=m.totalBet>0?'<span class="stat-value-sm '+SS.rtpClass(m.rtp)+'">'+m.rtp.toFixed(0)+'%</span>':'';
          const huntBadge=m.huntCount>0?'<span class="text-muted text-sm"> · '+m.huntCount+'🎯</span>':'';
          return'<div class="rtp-row"><div class="rtp-machine">'+esc(trn(m.name,18))+'<span class="text-muted text-sm"> · '+m.bonuses+' bonus</span>'+huntBadge+'</div><div class="rtp-values">'+rtpStr+'<span class="stat-value-sm negative">'+fC(m.profit,c)+'</span></div></div>';
        }).join('');
      }
      html+='</div>';
    }

    /* By provider */
    const byProv={};slotPlays.forEach(p=>{const pv=p.provider||'—';if(!byProv[pv])byProv[pv]={profit:0,plays:0,bet:0};byProv[pv].profit+=(p.balanceOut-p.balanceIn);byProv[pv].plays++;byProv[pv].bet+=playWager(p)});
    const provArr=Object.entries(byProv).filter(([n])=>n!=='—').map(([name,v])=>({name,...v,rtp:v.bet>0?((v.bet+v.profit)/v.bet*100):0}));
    if(provArr.length>=2){
      provArr.sort((a,b)=>b.profit-a.profit);
      html+='<div class="settings-card"><h3 class="card-title">🏢 Par fournisseur</h3>';
      html+=provArr.map(p=>'<div class="rtp-row"><div class="rtp-machine">'+esc(p.name)+'<span class="text-muted text-sm"> · '+p.plays+' play'+(p.plays>1?'s':'')+'</span></div><div class="rtp-values">'+(p.bet>0?'<span class="stat-value-sm '+SS.rtpClass(p.rtp)+'">'+p.rtp.toFixed(0)+'%</span>':'')+'<span class="stat-value-sm '+(p.profit>=0?'positive':'negative')+'">'+fC(p.profit,c)+'</span></div></div>').join('');
      html+='</div>';
    }

    return html;
  },

  /* === BJ TAB === */
  _renderBJ(data,bj,c){
    if(bj.sessions===0){
      return'<div class="settings-card" style="text-align:center;padding:var(--space-xl)"><p class="text-muted">Aucune session BJ sur cette période.</p></div>';
    }
    let html='<div class="settings-card"><h3 class="card-title">🃏 Blackjack</h3>';
    html+='<div class="stat-grid">';
    html+='<div class="stat-box"><div class="stat-value '+(bj.profit>=0?'positive':'negative')+'">'+fC(bj.profit,c)+'</div><div class="stat-label">Net</div></div>';
    html+='<div class="stat-box"><div class="stat-value">'+bj.sessions+'</div><div class="stat-label">Sessions</div></div>';
    html+='<div class="stat-box"><div class="stat-value">'+bj.totalHands+'</div><div class="stat-label">Mains</div></div>';
    html+='<div class="stat-box"><div class="stat-value">'+bj.winrate.toFixed(0)+'%</div><div class="stat-label">Winrate</div></div>';
    html+='</div>';
    let r='';
    r+='<div class="rtp-row"><div class="rtp-machine">Best / Worst session</div><div class="rtp-values"><span class="stat-value-sm positive">'+fC(bj.bestSession,c)+'</span><span class="stat-value-sm negative">'+fC(bj.worstSession,c)+'</span></div></div>';
    if(bj.adherence!=null)r+='<div class="rtp-row"><div class="rtp-machine">📚 Basic strategy</div><div class="rtp-values"><span class="stat-value-sm '+(bj.adherence>=90?'positive':bj.adherence>=75?'':'negative')+'">'+bj.adherence.toFixed(0)+'%</span><span class="text-muted text-sm">'+bj.adherenceCount+'</span></div></div>';
    if(bj.BJ>0)r+='<div class="rtp-row"><div class="rtp-machine">Blackjacks</div><div class="rtp-values"><span class="stat-value-sm positive">'+bj.BJ+'</span><span class="text-muted text-sm">'+bj.bjRate.toFixed(1)+'%</span></div></div>';
    r+='<div class="rtp-row"><div class="rtp-machine">W / L / P / SR</div><div class="rtp-values"><span class="stat-value-sm">'+bj.W+' / '+bj.L+' / '+bj.P+' / '+bj.SR+'</span></div></div>';
    if(bj.avgBet>0)r+='<div class="rtp-row"><div class="rtp-machine">Mise moyenne</div><div class="rtp-values"><span class="stat-value-sm">'+fA(bj.avgBet,c)+'</span></div></div>';
    if(bj.wagered>0)r+='<div class="rtp-row"><div class="rtp-machine">Total misé</div><div class="rtp-values"><span class="stat-value-sm">'+fA(bj.wagered,c)+'</span></div></div>';
    html+=r+'</div>';
    return html;
  },

  _bind(){
    document.querySelectorAll('#viewDashboard [data-range]').forEach(b=>b.addEventListener('click',()=>{this.range=b.dataset.range;this.render()}));
    document.querySelectorAll('#viewDashboard [data-tab]').forEach(b=>b.addEventListener('click',()=>{this.tab=b.dataset.tab;this.render()}));
  }
};
const App={
  v:'slots',
  async init(){this.nav();this.modal();this.hash();await this.uBR();await SE.init();await SL.init();await BJ.init();await BH.init();await DSH.init();document.addEventListener('click',e=>{if(e.target.id==='fabS')SL.fSess()})},
  nav(){document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>this.go(t.dataset.target)))},
  go(v){document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));const vw=document.querySelector('[data-view="'+v+'"]');if(vw){vw.classList.remove('active');void vw.offsetWidth;vw.classList.add('active')}const tb=document.querySelector('.nav-tab[data-target="'+v+'"]');if(tb)tb.classList.add('active');document.getElementById('appMain').scrollTop=0;this.v=v;location.hash=v;if(v==='slots')SL.render();else if(v==='hunt')BH.render();else if(v==='blackjack')BJ.render();else if(v==='dashboard')DSH.render()},
  hash(){const h=location.hash.replace('#','')||'slots';this.go(['slots','hunt','blackjack','dashboard','settings'].includes(h)?h:'slots');window.addEventListener('hashchange',()=>{const x=location.hash.replace('#','');if(x&&x!==this.v)this.go(x)})},
  modal(){document.getElementById('mX').onclick=()=>M.close();document.getElementById('mOv').addEventListener('click',e=>{if(e.target.id==='mOv')M.close()})},
  async uBR(){const el=document.getElementById('hBR'),cur=await BR.cur(),c=await S.get('currency');if(cur===null){el.textContent='—';el.classList.remove('negative');return}el.textContent=fA(cur,c);el.classList.toggle('negative',cur<(await S.get('bankrollInitial')))}
};
document.addEventListener('DOMContentLoaded',()=>App.init());
/* ═══ SERVICE WORKER REGISTRATION ═══ */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      /* Detect a waiting worker (new version available) and prompt activation */
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;if(!nw)return;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed'&&navigator.serviceWorker.controller){
            /* New version ready — activate it on next load.
               To force reload now, uncomment: nw.postMessage('SKIP_WAITING'); window.location.reload(); */
            console.log('[SW] New version installed, will activate on next visit.');
          }
        });
      });
    }).catch(err=>console.warn('[SW] register failed:',err));
  });
}
</script>
</body>
</html>
