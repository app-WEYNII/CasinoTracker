<style>

.modal-body{flex:1;overflow-y:auto;padding:var(--space-lg);-webkit-overflow-scrolling:touch}
.modal-footer{padding:var(--space-md) var(--space-lg);padding-bottom:calc(var(--space-md) + var(--safe-bottom));border-top:1px solid var(--border);display:flex;gap:var(--space-sm)}.modal-footer:empty{display:none}
.toast-container{position:fixed;top:calc(var(--header-h) + var(--space-md));left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:var(--space-sm);pointer-events:none;width:calc(100% - var(--space-xl));max-width:400px}
.toast{padding:12px var(--space-md);border-radius:var(--radius-sm);font-size:14px;font-weight:500;text-align:center;pointer-events:auto;animation:tIn .3s ease-out,tOut .3s ease-in forwards;animation-delay:0s,var(--toast-dur,2.5s)}.toast--success{background:var(--accent);color:#fff}.toast--error{background:var(--red);color:#fff}.toast--warning{background:var(--orange);color:#000}
@keyframes tIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(-8px)}}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-sm);margin-bottom:var(--space-md)}.stat-box{background:var(--bg-input);border-radius:var(--radius-sm);padding:var(--space-md);text-align:center}
.stat-value{font-family:var(--font-mono);font-size:20px;font-weight:700;line-height:1.2}.stat-value.positive{color:var(--accent)}.stat-value.negative{color:var(--red)}.stat-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.session-list{list-style:none}.session-item{display:flex;align-items:center;justify-content:space-between;padding:var(--space-md);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}.session-item:last-child{border-bottom:none}.session-item:active{background:var(--bg-card-hover)}
.session-info{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}.session-name{font-size:15px;font-weight:600}.session-date{font-size:12px;color:var(--text-muted)}

.empty-state{display:flex;flex-direction:column;align-items:center;padding:var(--space-2xl) var(--space-md);text-align:center;color:var(--text-muted)}.empty-state-icon{font-size:48px;margin-bottom:var(--space-md);opacity:.5}.empty-state-text{font-size:14px;max-width:240px}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--radius-full);font-size:11px;font-weight:600}.tag--blue{background:var(--blue-dim);color:var(--blue)}.tag--orange{background:var(--orange-dim);color:var(--orange)}.tag--green{background:var(--accent-dim);color:var(--accent)}.tag--red{background:var(--red-dim);color:var(--red)}

.chart-tab{flex-shrink:0;padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius-full);background:transparent;color:var(--text-muted);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}.chart-tab.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.chart-container{position:relative;min-height:100px}
.list-header{display:flex;align-items:center;justify-content:space-between;padding:var(--space-md) var(--space-lg);border-bottom:1px solid var(--border)}.text-muted{color:var(--text-muted)}.text-sm{font-size:12px}
.live-profit{text-align:center;font-family:var(--font-mono);font-size:24px;font-weight:700;padding:var(--space-md);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text-muted);margin:var(--space-sm) 0}.live-profit.positive{color:var(--accent);background:var(--accent-dim)}.live-profit.negative{color:var(--red);background:var(--red-dim)}
.hidden{display:none!important}
.rtp-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}.rtp-row:last-child{border-bottom:none}.rtp-machine{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}.rtp-values{display:flex;gap:var(--space-md);align-items:center;flex-shrink:0}.stat-value-sm{font-family:var(--font-mono);font-size:14px;font-weight:700}.stat-value-sm.positive{color:var(--accent)}.stat-value-sm.negative{color:var(--red)}
.play-row{display:flex;align-items:center;justify-content:space-between;padding:var(--space-md);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}.play-row:last-child{border-bottom:none}.play-row:active{background:var(--bg-card-hover)}.play-info{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}.play-name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}

.bonus-entry{background:var(--bg-input);border-radius:var(--radius-sm);padding:var(--space-md);margin-bottom:var(--space-sm);position:relative}

.bonus-entry .form-row{margin-bottom:0}
/* Machine chart bars */
.mach-bar{display:flex;align-items:center;gap:var(--space-sm);margin-bottom:6px;font-size:13px}
.mach-bar-name{width:110px;flex-shrink:0;text-align:right;color:var(--text-secondary);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mach-bar-track{flex:1;height:20px;background:var(--bg-input);border-radius:4px;overflow:hidden;position:relative}
.mach-bar-fill{height:100%;border-radius:4px;min-width:2px;transition:width .3s}
.mach-bar-val{width:80px;flex-shrink:0;font-family:var(--font-mono);font-weight:700;font-size:12px}
/* Blackjack — card grid, verdict, hand log */
.bj-hands-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bj-hand-zone{background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px;cursor:pointer;transition:border-color .12s,background .12s}
.bj-hand-zone.active{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--bg-input))}
.bj-hand-zone.done{opacity:.55;border-style:dashed}
.bj-split-banner{font-size:11px;text-transform:uppercase;color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent);padding:6px 10px;border-radius:var(--radius-sm);font-weight:700;letter-spacing:.6px;text-align:center;margin-bottom:8px}
.bj-split-hands{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bj-hand-label{font-size:10px;text-transform:uppercase;color:var(--text-muted);letter-spacing:.6px;font-weight:700;margin-bottom:6px}

.bj-hand-total.positive{color:var(--accent)}.bj-hand-total.negative{color:var(--red)}
.bj-bet-row{display:flex;align-items:center;gap:8px}
.bj-side-row{display:flex;align-items:center;gap:8px}

.bj-side-toggles::-webkit-scrollbar{height:0}

.bj-side-tog.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.bj-side-tog.on.off-default{background:var(--bg-card);border-color:var(--text-muted);color:var(--text-muted)}
.bj-action-btn{padding:12px 0;font-size:12px;font-weight:700;letter-spacing:.5px}
.bj-card-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:var(--space-md)}
.bj-card-btn{padding:14px 0;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:18px;font-weight:700;font-family:var(--font-mono);cursor:pointer;transition:all .12s}
.bj-card-btn:active{transform:scale(.94)}.bj-card-btn.suit-r{color:#ef4444}
.bj-hand-display{min-height:54px;background:var(--bg-input);border:1px dashed var(--border);border-radius:var(--radius-sm);padding:var(--space-sm);display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:var(--space-sm)}
.bj-hand-display .placeholder{color:var(--text-muted);font-size:13px;font-style:italic}
.bj-card-chip{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-family:var(--font-mono);font-weight:700;font-size:16px;display:inline-flex;align-items:center;gap:4px}
.bj-card-chip.r{color:#ef4444}
.bj-verdict{padding:var(--space-lg);border-radius:var(--radius-md);text-align:center;margin:var(--space-md) 0;border:2px solid currentColor}
.bj-verdict-action{font-size:32px;font-weight:900;letter-spacing:1px;line-height:1}
.bj-verdict-detail{font-size:12px;color:var(--text-muted);margin-top:6px;text-transform:uppercase;letter-spacing:.5px}
.bj-section-title{font-size:11px;text-transform:uppercase;color:var(--text-muted);letter-spacing:.8px;margin:var(--space-md) 0 var(--space-sm);font-weight:700}
.bj-streak{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--radius-full);font-size:11px;font-weight:700}
.bj-streak.W{background:var(--accent-dim);color:var(--accent)}.bj-streak.L{background:var(--red-dim);color:var(--red)}
.bj-hand-row{display:flex;align-items:center;justify-content:space-between;padding:10px var(--space-md);border-bottom:1px solid var(--border);font-size:13px}
.bj-hand-row:last-child{border-bottom:none}
.bj-result{display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;border-radius:6px;font-size:11px;font-weight:800;flex-shrink:0}
.bj-result.W{background:var(--accent);color:#fff}.bj-result.L{background:var(--red);color:#fff}.bj-result.P{background:var(--text-muted);color:#fff}.bj-result.BJ{background:#a855f7;color:#fff}.bj-result.SR{background:var(--text-muted);color:#fff;font-size:9px}

.bj-toggle-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-sm)}
.bj-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px var(--space-md);background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:600}
.bj-toggle.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

.batch-row{position:relative;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px}
.batch-row .form-row{gap:8px}
.batch-row .batch-remove{position:relative;align-self:flex-end;flex-shrink:0;width:32px;height:32px;background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:var(--radius-sm);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:0}
.batch-row .batch-remove:hover{color:var(--red);border-color:var(--red)}
.batch-summary{margin-top:8px;font-size:12px;font-weight:600;color:var(--text-secondary);text-align:right}

.dsh-heatmap{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;grid-auto-columns:1fr;gap:3px;width:100%}

.dsh-heat-cell:hover{transform:scale(1.2);z-index:10;position:relative}
/* Bonus Hunt */

<body>
<header class="app-header"><div><h1 class="app-title">Casino<span class="accent">Tracker</span></h1></div><span class="bankroll-badge" id="hBR">—</span></header>
<main class="app-main" id="appMain">

<div class="modal-overlay" id="mOv"><div class="modal"><div class="modal-header"><h3 class="modal-title" id="mT"></h3><button class="modal-close" id="mX">✕</button></div><div class="modal-body" id="mB"></div><div class="modal-footer" id="mF"></div></div></div>
<div class="toast-container" id="tC"></div>
<script>
/* ═══ DB v5 — added Bonus Hunt tables ═══ */
const db=new Dexie('CasinoTracker');
db.version(4).stores({settings:'key',slotSessions:'++id, date',slotPlays:'++id, sessionId, machineName',slotMachines:'++id, name',bjSessions:'++id, date',bjHands:'++id, sessionId',bankrollLog:'++id, date, source'});
db.version(5).stores({settings:'key',slotSessions:'++id, date',slotPlays:'++id, sessionId, machineName',slotMachines:'++id, name',bjSessions:'++id, date',bjHands:'++id, sessionId',bankrollLog:'++id, date, source',bhSessions:'++id, date, status',bhBonuses:'++id, sessionId, order'});
const S={defaults:{bankrollInitial:null,currency:'EUR',stopLoss:null,stopWin:null,bjH17:false,bjDAS:true,bjSurrender:false,bjBJPayout:1.5},async get(k){const r=await db.settings.get(k);return r?r.value:(this.defaults[k]??null)},async set(k,v){return db.settings.put({key:k,value:v})}};
const BR={async cur(){
  const i=await S.get('bankrollInitial');if(i===null)return null;
  /* Derive bankroll directly from session state — no log table needed.
     Closed session: net = cashout - deposit. Open session: deposit is "locked" → -deposit. */
  const slotSess=await db.slotSessions.toArray();
  const bjSess=await db.bjSessions.toArray();
  const bhSess=await db.bhSessions.toArray();
  let bankroll=i;
  for(const s of [...slotSess,...bjSess,...bhSess]){
    if(s.cashout!=null)bankroll+=(s.cashout||0)-(s.deposit||0);
    else bankroll-=(s.deposit||0);
  }
  return bankroll;
}};
const DIO={async expJSON(){return JSON.stringify({version:4,date:new Date().toISOString(),settings:await db.settings.toArray(),slotSessions:await db.slotSessions.toArray(),slotPlays:await db.slotPlays.toArray(),slotMachines:await db.slotMachines.toArray(),bjSessions:await db.bjSessions.toArray(),bjHands:await db.bjHands.toArray(),bankrollLog:await db.bankrollLog.toArray()},null,2)},async impJSON(j){const d=JSON.parse(j);if(!d.version)throw new Error('Invalid');const t=[db.settings,db.slotSessions,db.slotPlays,db.slotMachines,db.bjSessions,db.bjHands,db.bankrollLog];await db.transaction('rw',...t,async()=>{for(const x of t)await x.clear();for(const k of['settings','slotSessions','slotPlays','slotMachines','bjSessions','bjHands','bankrollLog'])if(d[k]?.length)await db[k].bulkAdd(d[k])})},dl(c,f,m){const b=new Blob(['\ufeff'+c],{type:m}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=f;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)},async reset(){const t=[db.settings,db.slotSessions,db.slotPlays,db.slotMachines,db.bjSessions,db.bjHands,db.bankrollLog];await db.transaction('rw',...t,async()=>{for(const x of t)await x.clear()})}};
const SYM={EUR:'€',USD:'$',GBP:'£'};function sy(c){return SYM[c]||c}
function fC(a,c='EUR'){return(a>=0?'+':'')+a.toFixed(2).replace('.',',')+sy(c)}
function fA(a,c='EUR'){return a.toFixed(2).replace('.',',')+sy(c)}
function fD(iso){return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit'})}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function trn(s,m){return s.length>m?s.slice(0,m-1)+'…':s}
let modalBusy=false;
const M={open({title='',body='',footer=''}={}){document.getElementById('mT').textContent=title;document.getElementById('mB').innerHTML=body;document.getElementById('mF').innerHTML=footer;document.getElementById('mOv').classList.add('open');modalBusy=false},close(){document.getElementById('mOv').classList.remove('open')},async confirm({title,message,confirmText='Confirmer',cancelText='Annuler',danger=false}){return new Promise(res=>{this.open({title,body:'<p style="color:var(--text-secondary);font-size:14px">'+message+'</p>',footer:'<button class="btn btn-outline" style="flex:1" id="_mC">'+cancelText+'</button><button class="btn '+(danger?'btn-danger':'btn-primary')+'" style="flex:1" id="_mK">'+confirmText+'</button>'});document.getElementById('_mC').onclick=()=>{this.close();res(false)};document.getElementById('_mK').onclick=()=>{this.close();res(true)}})},async waitClose(){this.close();return new Promise(r=>setTimeout(r,350))}};
const T={show(m,t='success',d=2500){const c=document.getElementById('tC'),e=document.createElement('div');e.className='toast toast--'+t;e.textContent=m;e.style.setProperty('--toast-dur',d+'ms');c.appendChild(e);setTimeout(()=>e.remove(),d+400)},ok(m){this.show(m)},err(m){this.show(m,'error',3500)},warn(m){this.show(m,'warning')}};

/* ═══ STATS — bonuses array, RTP & advanced bonus metrics ═══ */
/* Compute exact wager for a slot play — prefer spinBatches if present */
const playWager=p=>{
  if(Array.isArray(p.spinBatches)&&p.spinBatches.length){
    return p.spinBatches.reduce((s,b)=>s+(b.spins||0)*(b.bet||0),0);
  }
  return (p.totalSpins||0)*(p.betPerSpin||0);
};
const playSpins=p=>{
  if(Array.isArray(p.spinBatches)&&p.spinBatches.length){
    return p.spinBatches.reduce((s,b)=>s+(b.spins||0),0);
  }
  return p.totalSpins||0;
};
const SS={
  sess(sessions){const td=sessions.reduce((s,x)=>s+(x.deposit||0),0),tc=sessions.reduce((s,x)=>s+(x.cashout||0),0);return{dep:td,co:tc,profit:tc-td,roi:td>0?((tc-td)/td*100):0}},
  _med(a){if(!a.length)return 0;const s=[...a].sort((x,y)=>x-y),m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2},
  _std(a){if(a.length<2)return 0;const m=a.reduce((x,y)=>x+y,0)/a.length;return Math.sqrt(a.reduce((x,y)=>x+(y-m)**2,0)/a.length)},
  rtpClass(r){return r>=96?'positive':r>=92?'':'negative'},
  plays(plays){
    const tp=plays.reduce((s,p)=>s+(p.balanceOut-p.balanceIn),0);
    const totalBet=plays.reduce((s,p)=>s+playWager(p),0);
    let totalBonuses=0,totalSpins=0,spinsToSum=0,spinsToCount=0;
    const multis=[];
    plays.forEach(p=>{
      const b=p.bonuses||[];totalBonuses+=b.length;totalSpins+=playSpins(p);
      b.forEach(x=>{if(x.multiplier)multis.push(x.multiplier);if(x.spinsToTrigger){spinsToSum+=x.spinsToTrigger;spinsToCount++}});
    });
    const avgMulti=multis.length?multis.reduce((a,b)=>a+b,0)/multis.length:0;
    return{
      profit:tp,totalBet,
      rtp:totalBet>0?((totalBet+tp)/totalBet*100):0,
      bFreq:totalSpins>0?(totalBonuses/totalSpins*100):0,
      avgMulti,
      maxMulti:multis.length?Math.max(...multis):0,
      minMulti:multis.length?Math.min(...multis):0,
      medianMulti:this._med(multis),
      stdMulti:this._std(multis),
      avgSpinsTo:spinsToCount>0?Math.round(spinsToSum/spinsToCount):0,
      totalBonuses,totalSpins,total:plays.length
    };
  },
  byMach(plays){
    const g={};plays.forEach(p=>{const n=p.machineName;if(!g[n])g[n]=[];g[n].push(p)});
    return Object.entries(g).map(([name,pls])=>{
      const profit=pls.reduce((s,p)=>s+(p.balanceOut-p.balanceIn),0);
      const totalBet=pls.reduce((s,p)=>s+playWager(p),0);
      const totalSpins=pls.reduce((s,p)=>s+playSpins(p),0);
      const bonuses=pls.reduce((s,p)=>s+(p.bonuses||[]).length,0);
      return{name,profit,plays:pls.length,bonuses,totalBet,totalSpins,rtp:totalBet>0?((totalBet+profit)/totalBet*100):0};
    });
  },
  /* Merge per-machine slot plays + hunt bonuses (same machine name).
     Hunt bonuses contribute: cost (= wager), payout (= return), spinsToTrigger, +1 bonus count. */
  byMachWithHunt(plays,huntBonuses){
    const merged={};
    /* Slots first */
    plays.forEach(p=>{
      const n=p.machineName;if(!merged[n])merged[n]={name:n,profit:0,plays:0,bonuses:0,totalBet:0,totalSpins:0,spinsToList:[],multis:[],huntCount:0};
      merged[n].profit+=(p.balanceOut-p.balanceIn);
      merged[n].plays++;
      merged[n].totalBet+=playWager(p);
      merged[n].totalSpins+=playSpins(p);
      (p.bonuses||[]).forEach(b=>{
        merged[n].bonuses++;
        if(b.spinsToTrigger)merged[n].spinsToList.push(b.spinsToTrigger);
        if(b.multiplier)merged[n].multis.push(b.multiplier);
      });
    });
    /* Then hunts */
    huntBonuses.forEach(b=>{
      const n=b.machine;if(!n)return;
      if(!merged[n])merged[n]={name:n,profit:0,plays:0,bonuses:0,totalBet:0,totalSpins:0,spinsToList:[],multis:[],huntCount:0};
      merged[n].totalBet+=(b.cost||0);
      merged[n].totalSpins+=(b.spinsToTrigger||0);
      merged[n].bonuses++;
      merged[n].huntCount++;
      if(b.spinsToTrigger)merged[n].spinsToList.push(b.spinsToTrigger);
      if(b.payout!=null){
        merged[n].profit+=(b.payout-(b.cost||0));
        if(b.cost>0)merged[n].multis.push(b.payout/b.cost);
      }
    });
    return Object.values(merged).map(m=>({
      ...m,
      rtp:m.totalBet>0?((m.totalBet+m.profit)/m.totalBet*100):0,
      avgSpinsTo:m.spinsToList.length?Math.round(m.spinsToList.reduce((a,b)=>a+b,0)/m.spinsToList.length):0,
      avgMulti:m.multis.length?m.multis.reduce((a,b)=>a+b,0)/m.multis.length:0,
      maxMulti:m.multis.length?Math.max(...m.multis):0
    }));
  },
  /* Bonus ranking: returns hunt bonuses (only opened ones) sorted by P/L desc.
     Each: {machine, cost, payout, pnl, mult, sessionTitle, sessionDate} */
  bonusRanking(huntBonuses,huntSessionsById){
    return huntBonuses
      .filter(b=>b.payout!=null&&b.cost>0)
      .map(b=>{
        const sess=huntSessionsById[b.sessionId];
        return{
          ...b,
          pnl:b.payout-(b.cost||0),
          mult:b.payout/b.cost,
          sessionTitle:sess?(sess.title||'Hunt #'+sess.id):'',
          sessionDate:sess?sess.date:''
        };
      })
      .sort((a,b)=>b.pnl-a.pnl);
  }
};

/* ═══ BLACKJACK BASIC STRATEGY — 4-8 decks, DAS ═══
   Dealer upcard index: 0..9 = 2,3,4,5,6,7,8,9,T,A
   Codes (1 char per cell):
     H=Hit  S=Stand
     D=Double else Hit       d=Double else Stand
     P=Split                 p=Split if DAS else Hit
     R=Surrender else Hit    r=Surrender else Stand   q=Surrender else Split
*/
const BJ_DK=['2','3','4','5','6','7','8','9','T','A'];
const STRAT={
  /* HARD TOTALS — total without A=11 */
  hardS17:{
    5:'HHHHHHHHHH', 6:'HHHHHHHHHH', 7:'HHHHHHHHHH', 8:'HHHHHHHHHH',
    9:'HDDDDHHHHH', 10:'DDDDDDDDHH', 11:'DDDDDDDDDH',
    12:'HHSSSHHHHH', 13:'SSSSSHHHHH', 14:'SSSSSHHHHH',
    15:'SSSSSHHHRH', 16:'SSSSSHHRRR',
    17:'SSSSSSSSSS', 18:'SSSSSSSSSS', 19:'SSSSSSSSSS', 20:'SSSSSSSSSS', 21:'SSSSSSSSSS'
  },
  hardH17:{
    5:'HHHHHHHHHH', 6:'HHHHHHHHHH', 7:'HHHHHHHHHH', 8:'HHHHHHHHHH',
    9:'HDDDDHHHHH', 10:'DDDDDDDDHH', 11:'DDDDDDDDDD',
    12:'HHSSSHHHHH', 13:'SSSSSHHHHH', 14:'SSSSSHHHHH',
    15:'SSSSSHHHRR', 16:'SSSSSHHRRR',
    17:'SSSSSSSSSR', 18:'SSSSSSSSSS', 19:'SSSSSSSSSS', 20:'SSSSSSSSSS', 21:'SSSSSSSSSS'
  },
  /* SOFT TOTALS — A counted as 11. Key = OTHER card (2..9) */
  softS17:{
    2:'HHHDDHHHHH', 3:'HHHDDHHHHH', 4:'HHDDDHHHHH', 5:'HHDDDHHHHH',
    6:'HDDDDHHHHH', 7:'SddddSSHHH', 8:'SSSSSSSSSS', 9:'SSSSSSSSSS'
  },
  softH17:{
    2:'HHHDDHHHHH', 3:'HHHDDHHHHH', 4:'HHDDDHHHHH', 5:'HHDDDHHHHH',
    6:'DDDDDHHHHH', 7:'dddddSSHHH', 8:'SSSSdSSSSS', 9:'SSSSSSSSSS'
  },
  /* PAIRS — key = card value (1=Ace, 10=T) */
  pair:{
    1:'PPPPPPPPPP', 2:'ppPPPPHHHH', 3:'ppPPPPHHHH', 4:'HHHppHHHHH',
    5:'DDDDDDDDHH', 6:'pPPPPHHHHH', 7:'PPPPPPHHHH', 8:'PPPPPPPPPP',
    9:'PPPPPSPPSS', 10:'SSSSSSSSSS'
  }
};
/* Card helpers — value of each card (A=1 special, T/J/Q/K=10) */
const cv=c=>c==='A'?1:c==='T'||c==='J'||c==='Q'||c==='K'?10:+c;
const handTotal=cs=>{
  if(!cs.length)return{total:0,soft:false,isBJ:false,isPair:false,isBust:false};
  /* Sum all aces as 1 first, then promote ONE ace to 11 if possible (two would always bust) */
  let total=cs.reduce((s,c)=>s+cv(c),0);
  const soft=cs.includes('A')&&total+10<=21;
  if(soft)total+=10;
  return{
    total,soft,
    isBJ:cs.length===2&&total===21,
    isPair:cs.length===2&&cv(cs[0])===cv(cs[1]),
    isBust:total>21
  };
};
/* Strategy lookup — returns {action, code} */
const stratLookup=(playerCards,dealerUp,opts)=>{
  const{h17=false,das=true,surrender=false,canDouble=true,canSplit=true}=opts||{};
  const di=BJ_DK.indexOf(dealerUp);if(di<0)return null;
  const h=handTotal(playerCards);
  if(h.isBust)return{action:'BUST',code:'X'};
  if(h.isBJ)return{action:'BLACKJACK',code:'BJ'};
  let raw;
  if(h.isPair&&canSplit&&playerCards.length===2){
    const pv=cv(playerCards[0]);raw=STRAT.pair[pv]?.[di];
  }
  if(!raw&&h.soft&&playerCards.length===2){
    const other=playerCards.find(c=>c!=='A');
    if(other){const ov=cv(other);raw=(h17?STRAT.softH17:STRAT.softS17)[ov]?.[di]}
  }
  if(!raw){
    const tbl=h17?STRAT.hardH17:STRAT.hardS17;
    raw=tbl[Math.min(21,Math.max(5,h.total))]?.[di];
  }
  if(!raw)return{action:'STAND',code:'S'};
  let action;
  switch(raw){
    case'H':action='HIT';break;
    case'S':action='STAND';break;
    case'D':action=canDouble?'DOUBLE':'HIT';break;
    case'd':action=canDouble?'DOUBLE':'STAND';break;
    case'P':action='SPLIT';break;
    case'p':action=das?'SPLIT':'HIT';break;
    case'R':action=surrender?'SURRENDER':'HIT';break;
    case'r':action=surrender?'SURRENDER':'STAND';break;
    case'q':action=surrender?'SURRENDER':'SPLIT';break;
    default:action='STAND';
  }
  return{action,code:raw};
};
const ACTION_LABEL={HIT:'TIRER',STAND:'RESTER',DOUBLE:'DOUBLER',SPLIT:'SPLIT',SURRENDER:'ABANDONNER',BUST:'BUST',BLACKJACK:'BLACKJACK'};
const ACTION_COLOR={HIT:'var(--orange)',STAND:'var(--accent)',DOUBLE:'var(--blue)',SPLIT:'#a855f7',SURRENDER:'var(--text-muted)',BUST:'var(--red)',BLACKJACK:'var(--accent)'};
const PP_OPTS=[{m:6,l:'Mixte 6×'},{m:12,l:'Couleur 12×'},{m:25,l:'Parfaite 25×'}];
const TP_OPTS=[{m:5,l:'Flush 5×'},{m:10,l:'Suite 10×'},{m:30,l:'Brelan 30×'},{m:40,l:'Suite Cl. 40×'},{m:100,l:'Brelan Cl. 100×'}];
const SL={
  async init(){await this.render()},
  async render(){
    const el=document.getElementById('viewSlots'),sess=await db.slotSessions.orderBy('date').reverse().toArray(),ap=await db.slotPlays.toArray(),c=await S.get('currency')||'EUR';
    /* Fetch hunt bonuses to merge into machine stats (only opened ones contribute to P/L; all contribute to bet/spins) */
    const allHuntBonuses=await db.bhBonuses.toArray();

    html+='<div class="settings-card" style="padding:0"><div class="list-header"><h3 class="card-title" style="margin:0">Sessions</h3><span class="text-muted text-sm">'+sess.length+'</span></div><ul class="session-list" id="sL"></ul></div></div>';

  },
  _fab(){const f=document.createElement('button');f.className='fab';f.id='fabS';f.textContent='+';return f},
  _perfCard(ps,c){

    if(ps.totalBet>0)rows+='<div class="rtp-row"><div class="rtp-machine">RTP global</div><div class="rtp-values"><span class="stat-value-sm '+SS.rtpClass(ps.rtp)+'">'+ps.rtp.toFixed(1)+'%</span><span class="text-muted text-sm">'+fA(ps.totalBet,c)+' misés</span></div></div>';
    if(ps.maxMulti>0)rows+='<div class="rtp-row"><div class="rtp-machine">🔥 Plus gros bonus</div><div class="rtp-values"><span class="stat-value-sm positive">x'+ps.maxMulti.toFixed(0)+'</span></div></div>';
    if(ps.minMulti>0&&ps.minMulti!==ps.maxMulti)rows+='<div class="rtp-row"><div class="rtp-machine">❄️ Plus petit bonus</div><div class="rtp-values"><span class="stat-value-sm negative">x'+ps.minMulti.toFixed(0)+'</span></div></div>';
    if(ps.medianMulti>0&&ps.totalBonuses>=3)rows+='<div class="rtp-row"><div class="rtp-machine">Médiane</div><div class="rtp-values"><span class="stat-value-sm">x'+ps.medianMulti.toFixed(0)+'</span></div></div>';

    return rows?'<div class="settings-card"><h3 class="card-title">📊 Performance</h3>'+rows+'</div>':'';
  },
  _machList(plays,huntBonuses,c){
    const bm=SS.byMachWithHunt(plays,huntBonuses);if(!bm.length)return'';

    const showBadges=bm.length>=2;
    return'<div class="settings-card"><h3 class="card-title">🎰 Par machine</h3>'+bm.map((m,i)=>{
      const badge=showBadges?(i===0?'🔥 ':i===bm.length-1?'❄️ ':''):'';

  },
  _sessList(sess,ap,c){const ul=document.getElementById('sL');if(!ul)return;ul.innerHTML=sess.map(s=>{const pl=ap.filter(p=>p.sessionId===s.id),pr=(s.cashout||0)-(s.deposit||0),roi=s.deposit>0&&s.cashout!=null?((s.cashout-s.deposit)/s.deposit*100):0,names=[...new Set(pl.map(p=>p.machineName))],lb=names.length>2?names.slice(0,2).join(', ')+' +'+(names.length-2):names.join(', ')||'—',isOpen=s.cashout==null;return'<li class="session-item" data-id="'+s.id+'"><div class="session-info"><span class="session-name">'+fD(s.date)+' · '+pl.length+' machine'+(pl.length>1?'s':'')+(isOpen?'<span class="open-badge">En cours</span>':'')+'</span><span class="session-date">'+lb+' · Dépôt '+fA(s.deposit||0,c)+'</span></div><div style="text-align:right">'+(isOpen?'<span style="color:var(--orange)">—</span>':'<div class="session-profit '+(pr>=0?'positive':'negative')+'">'+fC(pr,c)+'</div><div class="text-muted text-sm">'+(roi>=0?'+':'')+roi.toFixed(0)+'%</div>')+'</div></li>'}).join('');ul.querySelectorAll('.session-item').forEach(li=>li.addEventListener('click',()=>this.detail(+li.dataset.id)))},

  /* ═══ CHART — SVG bankroll/roi, HTML bars for machines ═══ */
  _draw(type,sess,plays,c){
    const el=document.getElementById('cC');if(!el)return;
    const G='#10b981',R='#ef4444',TX='#94a3b8',BD='#1e293b';
    const closed=sess.filter(s=>s.cashout!=null),sorted=[...closed].sort((a,b)=>a.date.localeCompare(b.date));
    if(type==='bankroll'){
      let cum=0;const pts=sorted.map(s=>{cum+=(s.cashout||0)-(s.deposit||0);return cum});
      if(!pts.length){el.innerHTML='<div style="text-align:center;padding:40px" class="text-muted">Aucune session clôturée</div>';return}
      const W=el.clientWidth||320,H=200,P=40,PR=50;
      const labels=sorted.map(s=>fD(s.date)),min=Math.min(0,...pts),max=Math.max(0,...pts),range=max-min||1;
      const xStep=(W-PR-10)/(pts.length-1||1),yScale=(H-P-20)/range;
      const points=pts.map((v,i)=>[PR+i*xStep,H-P-(v-min)*yScale]);
      const line=points.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
      const area=line+' L'+points[points.length-1][0].toFixed(1)+','+(H-P)+' L'+PR+','+(H-P)+' Z';
      const col=pts[pts.length-1]>=0?G:R;
      let svg='<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'">';
      for(let i=0;i<=4;i++){const v=min+(range/4)*i;const y=H-P-(v-min)*yScale;svg+='<line x1="'+PR+'" y1="'+y.toFixed(1)+'" x2="'+W+'" y2="'+y.toFixed(1)+'" stroke="'+BD+'"/><text x="'+(PR-4)+'" y="'+(y+4).toFixed(1)+'" text-anchor="end" fill="'+TX+'" font-size="10">'+Math.round(v)+'</text>'}
      const ls=Math.max(1,Math.floor(pts.length/6));for(let i=0;i<pts.length;i+=ls)svg+='<text x="'+points[i][0].toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" fill="'+TX+'" font-size="10">'+labels[i]+'</text>';
      svg+='<path d="'+area+'" fill="'+col+'" opacity="0.15"/><path d="'+line+'" fill="none" stroke="'+col+'" stroke-width="2"/>';
      points.forEach((p,i)=>svg+='<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="3" fill="'+col+'"><title>'+labels[i]+': '+fC(pts[i],c)+'</title></circle>');
      el.innerHTML=svg+'</svg>';
    } else if(type==='roi'){
      const rois=sorted.map(s=>s.deposit>0?((s.cashout-s.deposit)/s.deposit*100):0);
      if(!rois.length){el.innerHTML='<div style="text-align:center;padding:40px" class="text-muted">Aucune session clôturée</div>';return}
      const W=el.clientWidth||320,H=200,PR=50,labels=sorted.map(s=>fD(s.date)),absMax=Math.max(10,...rois.map(Math.abs));
      const gap=(W-PR-10)/rois.length,barW=Math.min(30,Math.max(8,gap-2)),mid=H/2,scale=(H/2-30)/absMax;
      let svg='<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'">';
      [-absMax,-absMax/2,0,absMax/2,absMax].forEach(v=>{const y=mid-v*scale;svg+='<line x1="'+PR+'" y1="'+y.toFixed(1)+'" x2="'+W+'" y2="'+y.toFixed(1)+'" stroke="'+BD+'"/><text x="'+(PR-4)+'" y="'+(y+4).toFixed(1)+'" text-anchor="end" fill="'+TX+'" font-size="10">'+(v>=0?'+':'')+Math.round(v)+'%</text>'});
      rois.forEach((v,i)=>{const x=PR+i*gap+(gap-barW)/2,h=Math.abs(v)*scale,y=v>=0?mid-h:mid;svg+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+barW+'" height="'+Math.max(1,h).toFixed(1)+'" rx="2" fill="'+(v>=0?G:R)+'"><title>'+labels[i]+': '+(v>=0?'+':'')+v.toFixed(0)+'%</title></rect>'});
      const ls=Math.max(1,Math.floor(rois.length/6));for(let i=0;i<rois.length;i+=ls)svg+='<text x="'+(PR+i*gap+gap/2).toFixed(1)+'" y="'+(H-4)+'" text-anchor="middle" fill="'+TX+'" font-size="10">'+labels[i]+'</text>';
      el.innerHTML=svg+'</svg>';
    } else if(type==='machines'){
      const bm=SS.byMach(plays).sort((a,b)=>b.profit-a.profit).slice(0,15);
      if(!bm.length){el.innerHTML='<div style="text-align:center;padding:40px" class="text-muted">Aucune machine</div>';return}
      const absMax=Math.max(1,...bm.map(m=>Math.abs(m.profit)));
      el.innerHTML=bm.map(m=>{const pct=Math.abs(m.profit)/absMax*100;const col=m.profit>=0?G:R;return'<div class="mach-bar"><div class="mach-bar-name" title="'+esc(m.name)+'">'+esc(trn(m.name,14))+'</div><div class="mach-bar-track"><div class="mach-bar-fill" style="width:'+pct.toFixed(0)+'%;background:'+col+'"></div></div><div class="mach-bar-val" style="color:'+col+'">'+fC(m.profit,c)+'</div></div>'}).join('');
    }
  },

  /* ═══ SESSION DETAIL ═══ */
  async detail(id){
    const s=await db.slotSessions.get(id);if(!s)return;
    const plays=await db.slotPlays.where('sessionId').equals(id).toArray(),c=await S.get('currency')||'EUR';
    const isOpen=s.cashout==null;const pr=isOpen?null:(s.cashout-s.deposit);const roi=(!isOpen&&s.deposit>0)?((s.cashout-s.deposit)/s.deposit*100):0;
    const playSum=plays.reduce((sum,p)=>sum+(p.balanceOut-p.balanceIn),0);
    const totalBonuses=plays.reduce((sum,p)=>sum+(p.bonuses||[]).length,0);
    const rows=plays.length?plays.map(p=>{
      const pp=p.balanceOut-p.balanceIn;const b=p.bonuses||[];
      const tags=b.length?b.map(x=>'<span class="tag tag--blue">x'+(x.multiplier||'?')+(x.spinsToTrigger?' @'+x.spinsToTrigger+'sp':'')+'</span>').join(' '):'';
      /* Bet display: multi-batch shows breakdown, single-bet shows simple */
      const batches=Array.isArray(p.spinBatches)&&p.spinBatches.length?p.spinBatches:null;
      let betLbl;
      if(batches&&batches.length>1){
        const ts=batches.reduce((s,b)=>s+(b.spins||0),0);
        betLbl=batches.map(b=>(b.spins||0)+'@'+(b.bet||0)+sy(c)).join(' + ')+' · '+ts+' sp';
      } else {
        const bet=batches?batches[0].bet:p.betPerSpin;
        const sp=batches?batches[0].spins:p.totalSpins;
        betLbl='Mise '+bet+sy(c)+(sp?' · '+sp+' sp':'');
      }
      return'<div class="play-row" data-pid="'+p.id+'"><div class="play-info"><span class="play-name">'+esc(p.machineName)+' '+tags+'</span><span class="text-muted text-sm">'+betLbl+' · '+fA(p.balanceIn,c)+' → '+fA(p.balanceOut,c)+'</span></div><span class="session-profit '+(pp>=0?'positive':'negative')+'">'+fC(pp,c)+'</span></div>'
    }).join(''):'<div style="padding:var(--space-lg);text-align:center" class="text-muted">Aucune machine</div>';

    const statsHtml=isOpen
      ?'<div class="stat-grid"><div class="stat-box"><div class="stat-value">'+fA(s.deposit||0,c)+'</div><div class="stat-label">Dépôt</div></div><div class="stat-box"><div class="stat-value" style="color:var(--orange)">En cours</div><div class="stat-label">Cashout</div></div><div class="stat-box"><div class="stat-value '+(playSum>=0?'positive':'negative')+'">'+fC(playSum,c)+'</div><div class="stat-label">P/L machines</div></div><div class="stat-box"><div class="stat-value">'+totalBonuses+'</div><div class="stat-label">Bonus</div></div></div>'
      :'<div class="stat-grid"><div class="stat-box"><div class="stat-value">'+fA(s.deposit||0,c)+'</div><div class="stat-label">Dépôt</div></div><div class="stat-box"><div class="stat-value">'+fA(s.cashout,c)+'</div><div class="stat-label">Cashout</div></div><div class="stat-box"><div class="stat-value '+(pr>=0?'positive':'negative')+'">'+fC(pr,c)+'</div><div class="stat-label">Résultat</div></div><div class="stat-box"><div class="stat-value '+(roi>=0?'positive':'negative')+'">'+roi.toFixed(1)+'%</div><div class="stat-label">ROI</div></div></div>';

    /* Stop-loss / Stop-win alerts (open sessions only) */
    let alertHtml='';

      if(sl!=null&&sl>0&&playSum<=-sl){
        alertHtml='<div class="settings-card" style="background:var(--red-dim);border:1px solid rgba(239,68,68,.3);text-align:center;margin:var(--space-md) 0;padding:var(--space-md)"><strong style="color:var(--red);font-size:15px">🚨 Stop-loss atteint</strong><div style="color:var(--red);font-size:13px;margin-top:4px">'+fC(playSum,c)+' (limite '+fC(-sl,c)+')</div><div class="text-muted text-sm" style="margin-top:4px">Pense à clôturer la session</div></div>';
      } else if(sw!=null&&sw>0&&playSum>=sw){
        alertHtml='<div class="settings-card" style="background:var(--accent-dim);border:1px solid rgba(16,185,129,.3);text-align:center;margin:var(--space-md) 0;padding:var(--space-md)"><strong style="color:var(--accent);font-size:15px">🎉 Stop-win atteint</strong><div style="color:var(--accent);font-size:13px;margin-top:4px">'+fC(playSum,c)+' (objectif '+fC(sw,c)+')</div><div class="text-muted text-sm" style="margin-top:4px">Encaisse pendant que tu es en avance</div></div>';
      }

      if(sessStats.maxMulti>0)rows+='<div class="rtp-row"><div class="rtp-machine">🔥 Plus gros bonus</div><div class="rtp-values"><span class="stat-value-sm positive">x'+sessStats.maxMulti.toFixed(0)+'</span></div></div>';
      if(sessStats.totalBonuses>=2&&sessStats.avgMulti>0)rows+='<div class="rtp-row"><div class="rtp-machine">Multi moyen</div><div class="rtp-values"><span class="stat-value-sm">x'+sessStats.avgMulti.toFixed(1)+'</span></div></div>';
      if(rows)perfHtml='<div class="separator"></div><h3 class="card-title" style="font-size:14px;margin-bottom:var(--space-sm)">📊 Performance session</h3>'+rows;
    }

    M.open({title:'🎰 Session '+fD(s.date),
      body:statsHtml+alertHtml+perfHtml+'<div class="separator"></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-md)"><h3 class="card-title" style="margin:0">Machines ('+plays.length+')</h3><button class="btn btn-primary btn-sm" id="_ap">+ Machine</button></div><div>'+rows+'</div>'+(s.notes?'<div class="separator"></div><p class="text-muted text-sm">'+esc(s.notes)+'</p>':''),
      footer:'<button class="btn btn-danger" style="flex:.5" id="_ds">🗑️</button>'+(isOpen?'<button class="btn btn-warn" style="flex:1" id="_co">💰 Clôturer</button>':'<button class="btn btn-outline" style="flex:1" id="_es">✏️</button>')+'<button class="btn btn-outline" style="flex:1" id="_cl">Fermer</button>'});

    document.querySelectorAll('.play-row').forEach(r=>r.addEventListener('click',()=>{const p=plays.find(x=>x.id===+r.dataset.pid);if(p){M.close();setTimeout(()=>this.fPlay(s.id,p),300)}}));
  },

  async cashout(s){const c=await S.get('currency')||'EUR',sc=sy(c);M.open({title:'💰 Clôturer',body:'<p class="text-muted" style="margin-bottom:var(--space-md)">Dépôt : '+fA(s.deposit||0,c)+'</p><div class="form-group"><label>Cashout ('+sc+')</label><input type="number" class="input" id="_cov" placeholder="0" min="0" step="1" autofocus></div><div class="live-profit" id="_clp">—</div>',footer:'<button class="btn btn-outline" id="_clc" style="flex:1">Annuler</button><button class="btn btn-primary" id="_cls" style="flex:1">Clôturer</button>'});const $=i=>document.getElementById(i),cov=$('_cov'),lp=$('_clp');const up=()=>{const v=parseFloat(cov.value);if(isNaN(v)){lp.textContent='—';lp.className='live-profit';return}const p=v-(s.deposit||0),roi=s.deposit>0?((v-s.deposit)/s.deposit*100):0;lp.textContent=fC(p,c)+'  ·  ROI '+(roi>=0?'+':'')+roi.toFixed(0)+'%';lp.className='live-profit '+(p>=0?'positive':'negative')};cov.oninput=up;$('_clc').onclick=()=>{M.close();setTimeout(()=>this.detail(s.id),300)};$('_cls').onclick=async()=>{const v=parseFloat(cov.value);if(isNaN(v)){T.warn('Renseigne le cashout');return}await db.slotSessions.update(s.id,{cashout:v});T.ok('Clôturée');M.close();await this.render();await App.uBR();setTimeout(()=>this.detail(s.id),300)}},

  async fSess(edit=null){const isE=!!edit,s=edit||{},c=await S.get('currency')||'EUR',sc=sy(c),dd=s.date||new Date().toISOString().split('T')[0];let body='<div class="form-group"><label>Date</label><input type="date" class="input" id="_d" value="'+dd+'"></div><div class="form-group"><label>Dépôt ('+sc+')</label><input type="number" class="input" id="_dep" value="'+(s.deposit||'')+'" placeholder="100" min="0" step="1"></div>';if(isE&&s.cashout!=null)body+='<div class="form-group"><label>Cashout ('+sc+')</label><input type="number" class="input" id="_coE" value="'+s.cashout+'" min="0" step="1"></div>';body+='<div class="form-group"><label>Notes</label><textarea class="input" id="_n" rows="2" placeholder="Notes...">'+esc(s.notes||'')+'</textarea></div>';M.open({title:isE?'✏️ Modifier session':'🎰 Nouvelle session',body,footer:'<button class="btn btn-outline" id="_ca" style="flex:1">Annuler</button><button class="btn btn-primary" id="_sv" style="flex:1">'+(isE?'Modifier':'Créer')+'</button>'});const $=i=>document.getElementById(i);$('_ca').onclick=()=>M.close();$('_sv').onclick=async()=>{const data={date:$('_d').value||new Date().toISOString().split('T')[0],deposit:parseFloat($('_dep').value)||0,notes:$('_n').value.trim()};if(isE&&$('_coE'))data.cashout=parseFloat($('_coE').value)||0;try{if(isE){await db.slotSessions.update(edit.id,data);T.ok('Modifiée');M.close();await this.render();await App.uBR()}else{data.cashout=null;const nid=await db.slotSessions.add(data);T.ok('Créée');M.close();await this.render();await App.uBR();setTimeout(()=>this.detail(nid),300)}}catch(e){T.err(e.message)}}},

  /* ═══ PLAY FORM — multi-bonus + multi-bet batches ═══ */
  async fPlay(sid,edit=null){
    const isE=!!edit,p=edit||{},c=await S.get('currency')||'EUR',sc=sy(c);
    const lib=await db.slotMachines.toArray(),hist=await db.slotPlays.toArray();

    const bonuses=isE&&p.bonuses?[...p.bonuses]:[];
    /* Spin batches: array of {spins, bet}. Backward compat: legacy fields → 1 batch. */

    /* Compute weighted-average bet across batches (used for bonus multiplier display) */

    /* Auto-fill provider when a saved machine is selected */
    const provInp=$('_pv');

    const provMap={};

    lib.forEach(m=>{if(m.name&&m.provider)provMap[m.name.toLowerCase()]=m.provider});

      const n=machInp.value.trim().toLowerCase();

    };
    machInp.addEventListener('change',tryAutofillProvider);
    machInp.addEventListener('blur',tryAutofillProvider);
    /* Datalist option pick fires 'input' too — handle it without stomping on typing */
    machInp.addEventListener('input',e=>{
      const n=e.target.value.trim().toLowerCase();
      if(provMap[n]&&!provInp.value.trim())provInp.value=provMap[n];

    $('_pc').onclick=()=>{M.close();setTimeout(()=>this.detail(sid),300)};
    if(isE)$('_pd')?.addEventListener('click',async()=>{await M.waitClose();if(await M.confirm({title:'🗑️',message:'Supprimer "'+esc(edit.machineName)+'" ?',confirmText:'Supprimer',danger:true})){await db.slotPlays.delete(edit.id);T.ok('Supprimée');await this.render();setTimeout(()=>this.detail(sid),300)}});

    $('_ps').onclick=async()=>{
      if(modalBusy)return;modalBusy=true;
      const mn=$('_m').value.trim();if(!mn){T.warn('Nom requis');modalBusy=false;return}
      // Sync bonuses from DOM
      updateBonusMultis();
      const cleanBatches=batches.filter(b=>(b.spins||0)>0||(b.bet||0)>0);
      const totSpins=cleanBatches.reduce((s,b)=>s+(b.spins||0),0);
      const totWager=cleanBatches.reduce((s,b)=>s+(b.spins||0)*(b.bet||0),0);
      /* For legacy compat: betPerSpin = weighted-avg bet, totalSpins = sum */
      const avgBet=totSpins>0?totWager/totSpins:0;
      const data={sessionId:sid,machineName:mn,provider:$('_pv').value.trim(),
        spinBatches:cleanBatches,
        betPerSpin:Math.round(avgBet*10000)/10000,totalSpins:totSpins,
        balanceIn:parseFloat(bi.value)||0,balanceOut:parseFloat(bo.value)||0,
        bonuses:bonuses.filter(b=>b.payout>0||b.spinsToTrigger>0),notes:$('_pn').value.trim()};
      const exists=await db.slotMachines.where('name').equalsIgnoreCase(mn).count();
      if(!exists)await db.slotMachines.add({name:mn,provider:data.provider||''});
      try{if(isE){await db.slotPlays.update(edit.id,data);T.ok('Modifiée')}else{await db.slotPlays.add(data);T.ok('Ajoutée')}M.close();await this.render();setTimeout(()=>this.detail(sid),300)}catch(e){T.err(e.message);modalBusy=false}
    };
  }
};

/* ═══ BLACKJACK MODULE ═══ */
const BJS={
  compute(hands){
    let W=0,L=0,P=0,BJ=0,SR=0,mainProfit=0,maxW=0,maxL=0,curW=0,curL=0,betSum=0,goodMoves=0,checkable=0;
    let ppB=0,ppP=0,ppC=0,ppH=0,tpB=0,tpP=0,tpC=0,tpH=0;
    hands.forEach(h=>{
      mainProfit+=(h.payout||0)-(h.bet||0);
      betSum+=(h.bet||0);
      if(h.result==='W'){W++;curW++;curL=0;maxW=Math.max(maxW,curW)}
      else if(h.result==='BJ'){BJ++;W++;curW++;curL=0;maxW=Math.max(maxW,curW)}
      else if(h.result==='L'){L++;curL++;curW=0;maxL=Math.max(maxL,curL)}
      else if(h.result==='P'){P++}
      else if(h.result==='SR'){SR++;curL++;curW=0;maxL=Math.max(maxL,curL)}
      if(h.recommended&&h.action&&h.recommended!=='BLACKJACK'&&h.recommended!=='BUST'){
        checkable++;if(h.recommended===h.action)goodMoves++;
      }
      if(h.pp){ppC++;ppB+=h.pp.bet||0;ppP+=h.pp.payout||0;if((h.pp.payout||0)>0)ppH++}
      if(h.tp){tpC++;tpB+=h.tp.bet||0;tpP+=h.tp.payout||0;if((h.tp.payout||0)>0)tpH++}
    });
    const total=hands.length;
    const dec=W+L+SR;
    const sideNet=(ppP-ppB)+(tpP-tpB);
    return{
      total,W,L,P,BJ,SR,
      profit:mainProfit+sideNet,mainProfit,sideNet,
      betSum,
      winrate:dec>0?(W/dec*100):0,
      bjRate:total>0?(BJ/total*100):0,
      pushRate:total>0?(P/total*100):0,
      maxW,maxL,curStreak:curW>0?curW:-curL,
      adherence:checkable>0?(goodMoves/checkable*100):null,
      adherenceCount:goodMoves+'/'+checkable,
      avgBet:total>0?betSum/total:0,
      pp:{count:ppC,bet:ppB,payout:ppP,net:ppP-ppB,hits:ppH,hitRate:ppC>0?(ppH/ppC*100):0,rtp:ppB>0?(ppP/ppB*100):0},
      tp:{count:tpC,bet:tpB,payout:tpP,net:tpP-tpB,hits:tpH,hitRate:tpC>0?(tpH/tpC*100):0,rtp:tpB>0?(tpP/tpB*100):0}
    };
  }
};
const BJ={
  st:{p:[],d:[],sessionId:null,lastBet:null,currentBet:null,explicitAction:null,afterDouble:false,ppMult:0,tpMult:0,ppBet:null,tpBet:null,
      /* SPLIT state */
      splitMode:false, /* true when player has split */
      splitHands:[],   /* array of {cards:[], action:null, doubled:false, isAces:false} */
      splitIdx:0,      /* index of currently-playing sub-hand */
      splitDealer:[]   /* dealer cards (separate from this.st.d which is used pre-split) */
     },
  _target:'p',

  async init(){await this.render()},

  /* ── Helpers ── */
  _resetHand(){this.st.p=[];this.st.d=[];this.st.explicitAction=null;this.st.afterDouble=false;this.st.ppMult=0;this.st.tpMult=0;this.st.ppBet=null;this.st.tpBet=null;this.st.splitMode=false;this.st.splitHands=[];this.st.splitIdx=0;this.st.splitDealer=[];this._target='p'},

  /* Helper: returns the currently-active sub-hand object (in split mode), or null */
  _curSplitHand(){return this.st.splitMode?this.st.splitHands[this.st.splitIdx]:null},
  /* Helper: are all split sub-hands done playing? */
  _allSplitsDone(){return this.st.splitMode&&this.st.splitHands.every(h=>h.done)},

  _computeResult(sess){
    /* SPLIT MODE: compute result for each sub-hand */
    if(this.st.splitMode){
      if(!this._allSplitsDone())return null;
      if(this.st.splitDealer.length<2)return null;
      const dh=handTotal(this.st.splitDealer);
      const dealerMustHit=dh.total<17||(sess?.h17&&dh.total===17&&dh.soft);
      if(dealerMustHit)return null;
      /* Compute result for each sub-hand independently. BJ flag = false after split per casino rules */
      return this.st.splitHands.map(sh=>{
        const ph=handTotal(sh.cards);
        if(ph.isBust)return 'L';
        if(dh.isBust)return 'W';
        if(ph.total>dh.total)return 'W';
        if(ph.total===dh.total)return 'P';
        return 'L';
      });
    }
    /* NORMAL MODE */
    if(this.st.p.length<2||this.st.d.length<1)return null;
    const ph=handTotal(this.st.p),dh=handTotal(this.st.d);
    if(ph.isBust)return 'L';
    if(this.st.explicitAction==='SURRENDER')return 'SR';
    /* Player BJ — peek-rule resolution. Dealer never plays out a full hand
       once player BJ is confirmed and dealer is verified non-BJ. */
    if(ph.isBJ){
      if(this.st.d.length===1){
        if(this.st.d[0]!=='A'&&this.st.d[0]!=='T')return 'BJ';
        return null; /* need dealer 2nd card to peek */
      }
      return dh.isBJ?'P':'BJ';
    }
    if(this.st.d.length===1)return null;
    if(dh.isBust)return 'W';
    /* Dealer must hit on <17, also on soft 17 if H17 rule */
    const dealerMustHit=dh.total<17||(sess?.h17&&dh.total===17&&dh.soft);
    if(dealerMustHit)return null;
    if(dh.isBJ)return 'L';
    if(ph.total>dh.total)return 'W';
    if(ph.total===dh.total)return 'P';
    return 'L';
  },

  _payoutFor(result,bet,action){
    const mult=action==='DOUBLE'?2:1;
    if(result==='BJ')return{actualBet:bet,payout:bet+bet*1.5};
    if(result==='W')return{actualBet:bet*mult,payout:bet*mult*2};
    if(result==='P')return{actualBet:bet*mult,payout:bet*mult};
    if(result==='SR')return{actualBet:bet,payout:bet*0.5};
    return{actualBet:bet*mult,payout:0};
  },

  _inferAction(){
    if(this.st.explicitAction)return this.st.explicitAction;
    if(this.st.p.length>2)return 'HIT';
    return 'STAND';
  },

  /* In-place bet update — does NOT re-render the whole view, preserves keyboard focus */
  _setBetUI(v){
    this.st.currentBet=v;
    const inp=document.getElementById('bjBetInp');
    if(inp)inp.value=v;
    this._refreshVerdictPnL();
  },
  /* Update the verdict's P/L line if a result is currently shown */
  async _refreshVerdictPnL(){
    if(!this.st.sessionId)return;
    const sess=await db.bjSessions.get(this.st.sessionId);
    const result=this._computeResult(sess);
    if(!result)return;
    /* Split mode has multiple result rows — easier to re-render */
    if(this.st.splitMode&&Array.isArray(result)){this.render();return}
    const detail=document.querySelector('#viewBlackjack .bj-verdict .bj-verdict-detail');
    if(!detail)return;
    const pay=this._payoutFor(result,this.st.currentBet||0,this._inferAction());
    const net=pay.payout-pay.actualBet;
    detail.textContent=(net>=0?'+':'')+net.toFixed(2)+' (mise '+pay.actualBet.toFixed(2)+')';
  },

  _canAct(act){
    if(!this.st.sessionId)return false;
    /* SPLIT MODE: actions apply to current sub-hand */
    if(this.st.splitMode){
      const cur=this._curSplitHand();
      if(!cur||cur.done)return false;
      if(cur.cards.length<2)return false; /* need 2nd card distributed first */
      if(act==='SPLIT')return false; /* re-split not supported */
      if(act==='SURRENDER')return false; /* not allowed after split */
      if(act==='DOUBLE')return cur.cards.length===2&&!cur.isAces; /* DAS only on 2-card sub-hand, not aces */
      return true; /* STAND always allowed */
    }
    /* NORMAL MODE */
    if(this.st.explicitAction)return false;
    if(this.st.p.length<2||this.st.d.length<1)return false;
    const ph=handTotal(this.st.p);

    html+='</div>';

  _renderHandsCard(){
    /* SPLIT MODE: render sub-hands stacked + dealer separately */
    if(this.st.splitMode){
      const dealerActive=this._target==='d';
      let html='<div class="settings-card" style="padding:10px">';
      html+='<div class="bj-split-banner">✂ Split — main '+(this.st.splitIdx+1)+'/'+this.st.splitHands.length+'</div>';
      html+='<div class="bj-split-hands">';
      this.st.splitHands.forEach((sh,i)=>{
        const ht=handTotal(sh.cards);
        const isCur=!sh.done&&i===this.st.splitIdx&&this._target==='p';
        let lbl;
        if(sh.done){
          if(ht.isBust)lbl='BUST '+ht.total;
          else if(sh.action==='DOUBLE')lbl=ht.total+' · 2×';
          else lbl=ht.total+(ht.soft?' soft':'')+(sh.action==='STAND'?' · stand':'');
        } else {
          lbl=sh.cards.length<2?'En cours...':ht.total+(ht.soft?' soft':'');
        }
        html+='<div class="bj-hand-zone'+(isCur?' active':'')+(sh.done?' done':'')+'" data-splitidx="'+i+'"><div class="bj-hand-label">🎯 Main '+(i+1)+(isCur?' ◀':'')+(sh.done?' ✓':'')+'</div><div class="bj-hand-display">'+sh.cards.map(c=>'<span class="bj-card-chip">'+c+'</span>').join('')+(sh.cards.length<2&&isCur?'<span class="placeholder">Tape la carte</span>':'')+'</div><div class="bj-hand-total '+(ht.isBust?'negative':'')+'">'+lbl+'</div></div>';
      });
      html+='</div>';
      /* Dealer */
      const dh=handTotal(this.st.splitDealer);
      html+='<div class="bj-hand-zone'+(dealerActive?' active':'')+'" data-target="d" style="margin-top:8px"><div class="bj-hand-label">🃏 Croupier</div><div class="bj-hand-display">'+(this.st.splitDealer.length?this.st.splitDealer.map(c=>'<span class="bj-card-chip">'+c+'</span>').join(''):'<span class="placeholder">Up card</span>')+'</div>';
      if(this.st.splitDealer.length)html+='<div class="bj-hand-total '+(dh.isBust?'positive':'')+'">'+(dh.isBust?'BUST '+dh.total:dh.total+(this.st.splitDealer.length===1?' (up)':''))+'</div>';
      html+='</div></div>';
      return html;
    }
    /* NORMAL MODE */
    const ph=handTotal(this.st.p),dh=handTotal(this.st.d);
    const playerActive=this._target==='p',dealerActive=this._target==='d';
    let html='<div class="settings-card" style="padding:10px"><div class="bj-hands-row">';
    html+='<div class="bj-hand-zone'+(playerActive?' active':'')+'" data-target="p"><div class="bj-hand-label">🎯 Toi</div><div class="bj-hand-display">'+(this.st.p.length?this.st.p.map(c=>'<span class="bj-card-chip">'+c+'</span>').join(''):'<span class="placeholder">Tape tes cartes</span>')+'</div>';
    if(this.st.p.length)html+='<div class="bj-hand-total '+(ph.isBust?'negative':ph.isBJ?'positive':'')+'">'+(ph.isBust?'BUST '+ph.total:ph.isBJ?'BJ ✨':ph.total+(ph.soft?' soft':''))+'</div>';
    html+='</div>';
    html+='<div class="bj-hand-zone'+(dealerActive?' active':'')+'" data-target="d"><div class="bj-hand-label">🃏 Croupier</div><div class="bj-hand-display">'+(this.st.d.length?this.st.d.map(c=>'<span class="bj-card-chip">'+c+'</span>').join(''):'<span class="placeholder">Up card</span>')+'</div>';
    if(this.st.d.length)html+='<div class="bj-hand-total '+(dh.isBust?'positive':'')+'">'+(dh.isBust?'BUST '+dh.total:dh.total+(this.st.d.length===1?' (up)':''))+'</div>';
    html+='</div></div></div>';
    return html;
  },

  _renderVerdictCard(result,sess){
    /* SPLIT MODE FINAL RESULT */
    if(this.st.splitMode&&Array.isArray(result)){
      const bet=this.st.currentBet||0;
      let totalNet=0;
      const rows=result.map((r,i)=>{
        const sh=this.st.splitHands[i];
        const action=sh.action||'STAND';
        const pay=this._payoutFor(r,bet,action);
        const net=pay.payout-pay.actualBet;
        totalNet+=net;
        const rl={W:'GAGNÉ',L:'PERDU',P:'PUSH'}[r]||r;
        const rc=r==='W'?'var(--accent)':r==='P'?'var(--text-muted)':'var(--red)';
        return'<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;font-weight:600">Main '+(i+1)+(action==='DOUBLE'?' (2×)':'')+'</span><span style="font-size:14px;font-weight:700;color:'+rc+'">'+rl+'</span><span class="stat-value-sm '+(net>=0?'positive':'negative')+'">'+(net>=0?'+':'')+net.toFixed(2)+'</span></div>';
      }).join('');
      const totCol=totalNet>=0?'var(--accent)':'var(--red)';
      return'<div class="settings-card bj-verdict" style="color:'+totCol+';background:color-mix(in srgb,'+totCol+' 10%,transparent);border:2px solid currentColor;margin-bottom:var(--space-md);padding:var(--space-md)"><div style="text-align:center;font-size:11px;text-transform:uppercase;color:var(--text-muted);font-weight:700;letter-spacing:.6px;margin-bottom:8px">Résultats split</div>'+rows+'<div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;margin-top:4px"><span style="font-size:13px;font-weight:700">TOTAL</span><span class="bj-verdict-action" style="font-size:22px">'+(totalNet>=0?'+':'')+totalNet.toFixed(2)+'</span></div></div>';
    }
    /* SPLIT MODE — verdict for current sub-hand */
    if(this.st.splitMode){
      const cur=this._curSplitHand();
      if(!cur)return'';
      const ph=handTotal(cur.cards);
      const isAces=cur.isAces;
      if(cur.cards.length<2){
        return'<div class="settings-card" style="text-align:center;color:var(--text-muted);padding:14px"><div style="font-size:14px;font-weight:600">Tape la 2e carte de la main '+(this.st.splitIdx+1)+(isAces?' (As : 1 carte uniquement)':'')+'</div></div>';
      }
      if(ph.isBust){
        return'<div class="settings-card bj-verdict" style="color:var(--red);background:color-mix(in srgb,var(--red) 10%,transparent);border:2px solid currentColor;text-align:center;margin-bottom:var(--space-md)"><div class="bj-verdict-action">BUST</div><div class="bj-verdict-detail">Main '+(this.st.splitIdx+1)+' perdue</div></div>';
      }
      /* Show advisor for current sub-hand */
      const opts=sess?{h17:sess.h17,das:sess.das,surrender:false,canDouble:cur.cards.length===2&&!isAces,canSplit:false}:{canDouble:true,canSplit:false};
      const upCard=this.st.splitDealer[0];
      if(!upCard)return'';
      const r=stratLookup(cur.cards,upCard,opts);
      const col=ACTION_COLOR[r.action]||'var(--text)';
      const lbl=ACTION_LABEL[r.action]||r.action;
      const detail='Main '+(this.st.splitIdx+1)+' · '+ph.total+(ph.soft?' soft':'')+' vs '+upCard;
      return'<div class="settings-card bj-verdict" style="color:'+col+';background:color-mix(in srgb,'+col+' 12%,transparent);border:2px solid currentColor;text-align:center;margin-bottom:var(--space-md)"><div class="bj-verdict-action">'+lbl+'</div><div class="bj-verdict-detail">'+detail+'</div></div>';
    }
    /* NORMAL MODE — single result */
    if(result){
      const rl={W:'GAGNÉ',L:'PERDU',P:'PUSH',BJ:'BLACKJACK ✨',SR:'SURRENDER'}[result];
      const rc=result==='W'||result==='BJ'?'var(--accent)':result==='P'?'var(--text-muted)':'var(--red)';
      const bet=this.st.currentBet||0;
      const pay=this._payoutFor(result,bet,this._inferAction());
      const net=pay.payout-pay.actualBet;
      return'<div class="settings-card bj-verdict" style="color:'+rc+';background:color-mix(in srgb,'+rc+' 10%,transparent);border:2px solid currentColor;text-align:center;margin-bottom:var(--space-md)"><div class="bj-verdict-action" style="font-size:26px">'+rl+'</div><div class="bj-verdict-detail">'+(net>=0?'+':'')+net.toFixed(2)+' (mise '+pay.actualBet.toFixed(2)+')</div></div>';
    }
    if(this.st.p.length>=2&&this.st.d.length===1&&!this.st.explicitAction){
      const opts=sess?{h17:sess.h17,das:sess.das,surrender:sess.surrender,canDouble:this.st.p.length===2,canSplit:this.st.p.length===2&&handTotal(this.st.p).isPair}:{canDouble:true,canSplit:true};
      const r=stratLookup(this.st.p,this.st.d[0],opts);
      const ph=handTotal(this.st.p);
      const col=ACTION_COLOR[r.action]||'var(--text)';
      const lbl=ACTION_LABEL[r.action]||r.action;
      const detail=ph.isBJ?'Tape la 2e carte croupier (vérif BJ)':ph.isBust?'Tu as fait sauter':'Total '+ph.total+(ph.soft?' soft':'')+' vs '+this.st.d[0];
      return'<div class="settings-card bj-verdict" style="color:'+col+';background:color-mix(in srgb,'+col+' 12%,transparent);border:2px solid currentColor;text-align:center;margin-bottom:var(--space-md)"><div class="bj-verdict-action">'+lbl+'</div><div class="bj-verdict-detail">'+detail+'</div></div>';
    }
    /* Hint */
    let hint;
    if(this.st.p.length<2)hint='Tape tes 2 cartes';
    else if(this.st.d.length===0)hint='Tape la up card du croupier';
    else if(this.st.explicitAction&&this.st.d.length>=1)hint='Tape les cartes du croupier jusqu\'à ≥17';
    else hint='Continue à taper les cartes';
    return'<div class="settings-card" style="text-align:center;color:var(--text-muted);padding:14px"><div style="font-size:14px;font-weight:600">'+hint+'</div></div>';
  },

  },

  _addCard(c){
    /* === SPLIT MODE === */
    if(this.st.splitMode){
      if(this._target==='p'){
        const cur=this._curSplitHand();
        if(!cur||cur.done)return;
        if(this.st.afterDouble){
          /* Single card after DOUBLE → auto-stand this sub-hand */
          cur.cards.push(c);
          cur.done=true;
          this.st.afterDouble=false;
          this._advanceSplit();
        } else {
          if(cur.cards.length<6)cur.cards.push(c);
          /* Special: split aces get exactly 1 card per hand, no further actions */
          if(cur.isAces&&cur.cards.length===2){
            cur.action='STAND';
            cur.done=true;
            this._advanceSplit();
          } else if(cur.cards.length>=2){
            /* Check bust */
            const ht=handTotal(cur.cards);
            if(ht.isBust){cur.action=cur.action||'HIT';cur.done=true;this._advanceSplit()}
          }
        }
      } else {
        /* Dealer cards in split mode use this.st.splitDealer (single up card already there) */
        if(this.st.splitDealer.length===0){
          /* Shouldn't happen — up card was preserved at split-time */
          this.st.splitDealer.push(c);
        } else {
          this.st.splitDealer.push(c);
        }
      }
      this.render();return;
    }

    /* === NORMAL MODE === */
    if(this._target==='p'){
      if(this.st.afterDouble){
        this.st.p.push(c);this.st.afterDouble=false;this._target='d';
      } else {
        if(this.st.p.length<6)this.st.p.push(c);
        if(this.st.p.length===2&&this.st.d.length===0)this._target='d';
      }
    } else {
      /* Dealer card */
      if(this.st.d.length===0){
        this.st.d.push(c);
        /* After up card: if player has BJ, KEEP target on dealer (peek check / log dealer hand).
           Otherwise switch to player so they can hit. */
        if(this.st.p.length>=2&&handTotal(this.st.p).isBJ){
          this._target='d';
        } else if(this.st.p.length>=2&&!this.st.explicitAction){
          this._target='p';
        }
      } else {
        /* Subsequent dealer cards = dealer is playing → infer STAND if not set */
        if(!this.st.explicitAction&&this.st.p.length>=2)this.st.explicitAction='STAND';
        this.st.d.push(c);
      }
    }
    this.render();
  },

  _setAction(act){
    if(act==='SPLIT'){
      /* Enter split mode: create 2 sub-hands, each starting with one of the pair */
      if(this.st.p.length!==2||!handTotal(this.st.p).isPair)return;
      const c1=this.st.p[0],c2=this.st.p[1];
      const isAces=cv(c1)===1;
      this.st.splitMode=true;
      this.st.splitHands=[
        {cards:[c1],action:null,doubled:false,isAces,done:false},
        {cards:[c2],action:null,doubled:false,isAces,done:false}
      ];
      this.st.splitIdx=0;
      this.st.splitDealer=[...this.st.d]; /* preserve dealer up card */
      this.st.p=[];this.st.d=[]; /* clear pre-split arrays */
      this.st.explicitAction=null;
      this._target='p'; /* now waiting for 2nd card of sub-hand 1 */
      this.render();return;
    }
    if(this.st.splitMode){
      const cur=this._curSplitHand();
      if(!cur||cur.done)return;
      if(act==='STAND'){cur.action='STAND';cur.done=true;this._advanceSplit()}
      else if(act==='DOUBLE'){
        if(cur.cards.length!==2)return;
        cur.action='DOUBLE';cur.doubled=true;
        /* DOUBLE = exactly one more card then auto-stand */
        this.st.afterDouble=true;
        this._target='p';
      }
      else if(act==='SURRENDER'){return} /* not allowed after split */
      this.render();return;
    }
    if(act==='STAND'){this.st.explicitAction='STAND';this._target='d'}
    else if(act==='DOUBLE'){this.st.explicitAction='DOUBLE';this.st.afterDouble=true;this._target='p'}
    else if(act==='SURRENDER'){this.st.explicitAction='SURRENDER'}
    this.render();
  },

  /* Advance to next sub-hand or to dealer phase */
  _advanceSplit(){
    const next=this.st.splitHands.findIndex((h,i)=>i>this.st.splitIdx&&!h.done);
    if(next>=0){
      this.st.splitIdx=next;
      this._target='p'; /* tap 2nd card of next sub-hand */
    } else {
      /* All sub-hands done — move to dealer */
      this._target='d';
    }
  },

  _undo(){
    /* === SPLIT MODE === */
    if(this.st.splitMode){
      /* Order: dealer extra cards → undo current sub-hand action / cards → exit split */
      if(this.st.splitDealer.length>1){this.st.splitDealer.pop();return this.render()}
      const cur=this._curSplitHand();
      /* If current hand was just marked done by stand/double — undo the action first */
      if(cur&&cur.done&&cur.action){
        cur.done=false;cur.action=null;cur.doubled=false;
        this.st.afterDouble=false;
        this._target='p';
        return this.render();
      }
      /* Undo the most recently played sub-hand if current is empty/incomplete */
      const lastDone=[...this.st.splitHands].map((h,i)=>({h,i})).reverse().find(x=>x.h.done);
      if(cur&&cur.cards.length<=1&&lastDone){
        lastDone.h.done=false;lastDone.h.action=null;lastDone.h.doubled=false;
        this.st.splitIdx=lastDone.i;
        this._target='p';
        return this.render();
      }
      /* Pop a card from current sub-hand */
      if(cur&&cur.cards.length>1){cur.cards.pop();return this.render()}
      /* If we're at start of sub-hand 1 with no cards added yet — exit split */
      if(this.st.splitIdx===0&&cur&&cur.cards.length===1){
        const c1=this.st.splitHands[0].cards[0],c2=this.st.splitHands[1].cards[0];
        this.st.p=[c1,c2];this.st.d=[...this.st.splitDealer];
        this.st.splitMode=false;this.st.splitHands=[];this.st.splitIdx=0;this.st.splitDealer=[];
        this._target='p';
        return this.render();
      }
      return this.render();
    }
    /* === NORMAL MODE === */
    /* Order of undo: dealer extra cards → action → player extra cards → up card → starting cards */
    if(this.st.d.length>1){this.st.d.pop();return this.render()}
    if(this.st.explicitAction){
      this.st.explicitAction=null;this.st.afterDouble=false;
      /* If we're not at base 2-card hand, target stays p, else d */
      this._target=this.st.p.length>2?'p':(this.st.d.length===0?'d':'p');
      return this.render();
    }
    if(this.st.p.length>2){this.st.p.pop();this._target='p';return this.render()}
    if(this.st.d.length===1){this.st.d.pop();this._target='d';return this.render()}
    if(this.st.p.length>0){this.st.p.pop();this._target='p';return this.render()}
    this.render();
  },

  /* ── Log ── */
  async _logHand(){
    if(!this.st.sessionId)return T.warn('Aucune session active');
    const sess=await db.bjSessions.get(this.st.sessionId);
    const result=this._computeResult(sess);
    if(!result)return T.warn('La main n\'est pas terminée');
    const bet=this.st.currentBet||0;
    if(bet<=0)return T.warn('Mise requise');

    /* === SPLIT MODE — log each sub-hand as separate DB entry === */
    if(this.st.splitMode&&Array.isArray(result)){
      const splitGroup='sp_'+Date.now();
      const dlrUp=this.st.splitDealer[0];
      const dealerCards=this.st.splitDealer.join('');
      try{
        const ts=Date.now();
        for(let i=0;i<result.length;i++){
          const sh=this.st.splitHands[i];
          const r=result[i];
          const action=sh.action||'STAND';
          const{actualBet,payout}=this._payoutFor(r,bet,action);
          /* Per-sub-hand recommendation: lookup at the 2-card decision point.
             Aces split is forced auto-stand → no adherence to track. */
          let subRecommended=null;
          if(!sh.isAces&&sh.cards.length>=2){
            const subOpts={h17:sess.h17,das:sess.das,surrender:false,canDouble:sh.cards.length===2,canSplit:false};
            const sl=stratLookup(sh.cards.slice(0,2),dlrUp,subOpts);
            if(sl)subRecommended=sl.action;
          }
          const subRec={sessionId:this.st.sessionId,ts:ts+i,playerCards:sh.cards.join(''),dealerCard:dlrUp,dealerCards,bet:actualBet,action,result:r,payout,splitGroup,splitIdx:i};
          if(subRecommended)subRec.recommended=subRecommended;
          /* Side bets attached only to first sub-hand to avoid double counting */
          if(i===0){
            if((this.st.ppBet||0)>0){const m=this.st.ppMult,b=this.st.ppBet;subRec.pp={bet:b,mult:m,payout:m>0?(b+b*m):0}}
            if((this.st.tpBet||0)>0){const m=this.st.tpMult,b=this.st.tpBet;subRec.tp={bet:b,mult:m,payout:m>0?(b+b*m):0}}
          }
          await db.bjHands.add(subRec);
        }
        this.st.lastBet=bet;
        this._resetHand();
        T.ok(result.length+' mains split enregistrées');
        await this.render();await App.uBR();
      }catch(e){T.err(e.message)}
      return;
    }

    /* === NORMAL MODE === */
    const action=this._inferAction();
    const{actualBet,payout}=this._payoutFor(result,bet,action);
    const cards=this.st.p.join(''),dlr=this.st.d[0];
    /* Recommended action for adherence — use original 2-card decision */
    const opts={h17:sess.h17,das:sess.das,surrender:sess.surrender,canDouble:true,canSplit:handTotal(this.st.p.slice(0,2)).isPair};
    const rec=stratLookup(this.st.p.slice(0,2),this.st.d[0],opts);
    const recObj={sessionId:this.st.sessionId,ts:Date.now(),playerCards:cards,dealerCard:dlr,dealerCards:this.st.d.join(''),bet:actualBet,action,result,payout,recommended:rec.action};
    /* Side bets — only logged if a per-hand bet was entered */
    if((this.st.ppBet||0)>0){
      const m=this.st.ppMult,b=this.st.ppBet;
      recObj.pp={bet:b,mult:m,payout:m>0?(b+b*m):0};
    }
    if((this.st.tpBet||0)>0){
      const m=this.st.tpMult,b=this.st.tpBet;
      recObj.tp={bet:b,mult:m,payout:m>0?(b+b*m):0};
    }
    try{
      await db.bjHands.add(recObj);
      this.st.lastBet=bet;
      this._resetHand();
      T.ok('Main enregistrée');
      await this.render();await App.uBR();
    }catch(e){T.err(e.message)}
  },

      const data={date:$('_bd').value||new Date().toISOString().split('T')[0],defaultBet:parseFloat($('_bbet').value)||5,ppDefault:parseFloat($('_bpp').value)||0,tpDefault:parseFloat($('_btp').value)||0,h17:toggles.h17,das:toggles.das,surrender:toggles.sur};
      try{
        if(isEdit){await db.bjSessions.update(this.st.sessionId,data);T.ok('Sauvegardé')}

          await S.set('bjH17',toggles.h17);await S.set('bjDAS',toggles.das);await S.set('bjSurrender',toggles.sur);
          await db.bjSessions.add(data);this.st.currentBet=data.defaultBet;T.ok('Session démarrée')}

  async cashout(){
    if(!this.st.sessionId)return;
    const s=await db.bjSessions.get(this.st.sessionId);
    const hands=await db.bjHands.where('sessionId').equals(this.st.sessionId).toArray();
    const st=BJS.compute(hands);
    const c=await S.get('currency')||'EUR',sc=sy(c);
    const suggested=(s.deposit||0)+st.profit;
    let summary='<div class="stat-grid" style="margin-bottom:var(--space-md)">';
    summary+='<div class="stat-box"><div class="stat-value '+(st.profit>=0?'positive':'negative')+'">'+fC(st.profit,c)+'</div><div class="stat-label">P/L</div></div>';
    summary+='<div class="stat-box"><div class="stat-value">'+st.total+'</div><div class="stat-label">Mains</div></div>';
    summary+='<div class="stat-box"><div class="stat-value">'+st.winrate.toFixed(0)+'%</div><div class="stat-label">Winrate</div></div>';
    summary+='<div class="stat-box"><div class="stat-value">'+st.maxW+'/'+st.maxL+'</div><div class="stat-label">Max W/L</div></div>';
    summary+='</div>';
    let extra='';
    if(st.adherence!=null)extra+='<div class="rtp-row"><div class="rtp-machine">📚 Basic strategy</div><div class="rtp-values"><span class="stat-value-sm '+(st.adherence>=90?'positive':st.adherence>=75?'':'negative')+'">'+st.adherence.toFixed(0)+'%</span><span class="text-muted text-sm">'+st.adherenceCount+'</span></div></div>';
    if(st.BJ>0)extra+='<div class="rtp-row"><div class="rtp-machine">Blackjacks</div><div class="rtp-values"><span class="stat-value-sm positive">'+st.BJ+' ('+st.bjRate.toFixed(1)+'%)</span></div></div>';

/* ═══ BONUS HUNT MODULE ═══ */
const BH={
  st:{viewSession:null}, /* currently selected hunt session id, or null = list view */

  async init(){await this.render()},

  /* Aggregate stats for a hunt session given its bonuses array */
  compute(sess,bonuses){
    const opened=bonuses.filter(b=>b.payout!=null);
    const remaining=bonuses.filter(b=>b.payout==null);
    const totalCost=bonuses.reduce((s,b)=>s+(b.cost||0),0);
    const totalPayout=opened.reduce((s,b)=>s+(b.payout||0),0);
    const openedCost=opened.reduce((s,b)=>s+(b.cost||0),0);
    const remainingCost=remaining.reduce((s,b)=>s+(b.cost||0),0);
    /* avgX = average payout multiplier on opened bonuses (payout / cost) */
    const avgXOpened=openedCost>0?totalPayout/openedCost:0;
    /* X required on remaining bonuses to break even on the whole hunt
       payout_remaining_needed = max(0, deposit - totalPayout)
       avgX_needed = needed / remainingCost */
    const dep=sess.deposit||0;
    const remainingNeed=Math.max(0,dep-totalPayout);
    const xNeeded=remainingCost>0?remainingNeed/remainingCost:null;
    /* Best/worst bonus by multiplier */
    const opMult=opened.map(b=>({...b,mult:b.cost>0?b.payout/b.cost:0}));
    opMult.sort((a,b)=>b.mult-a.mult);
    return{
      totalCost,totalPayout,openedCost,remainingCost,
      openedCount:opened.length,remainingCount:remaining.length,totalCount:bonuses.length,
      avgXOpened,xNeeded,
      best:opMult[0]||null,worst:opMult[opMult.length-1]||null,
      hunRTP:totalCost>0?totalPayout/totalCost:0,
      profit:dep>0?totalPayout-dep:0
    };
  },

  async render(){
    const v=document.getElementById('viewBonusHunt');if(!v)return;
    if(this.st.viewSession){await this._renderDetail(v);return}
    await this._renderList(v);
  },

  async _renderList(v){
    const sess=await db.bhSessions.orderBy('date').reverse().toArray();
    const c=await S.get('currency')||'EUR';
    let html='<div class="view-inner"><div class="view-header"><h2 class="view-title">🎯 Bonus Hunt</h2><button class="btn btn-primary" id="bhNew">+ Nouvelle hunt</button></div>';
    if(sess.length===0){
      html+='<div class="empty-state"><div class="empty-icon">🎯</div><div class="empty-title">Aucune hunt</div><div class="empty-desc">Démarre une chasse aux bonus pour mesurer ton RTP global</div></div>';
    } else {
      for(const s of sess){
        const bonuses=await db.bhBonuses.where('sessionId').equals(s.id).toArray();
        const st=this.compute(s,bonuses);
        const date=new Date(s.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
        let profitTxt,profitClass='';
        if(s.cashout!=null){profitTxt=fC(s.cashout-(s.deposit||0),c);profitClass=s.cashout>=(s.deposit||0)?'positive':'negative'}
        else if(st.openedCount>0){profitTxt=fA(st.totalPayout,c)+' / '+fA(s.deposit||0,c)}
        else{profitTxt='En cours'}
        html+='<div class="card session-card" data-bhsid="'+s.id+'"><div class="session-card-row"><div><div class="session-card-title">'+esc(s.title||'Hunt #'+s.id)+'</div><div class="session-card-meta">'+date+' · '+st.totalCount+' bonus · <span class="bh-status '+s.status+'">'+s.status+'</span></div></div><div class="session-card-amount '+profitClass+'">'+profitTxt+'</div></div></div>';
      }
    }
    html+='</div>';
    v.innerHTML=html;
    document.getElementById('bhNew')?.addEventListener('click',()=>this.fNew());
    document.querySelectorAll('[data-bhsid]').forEach(el=>el.addEventListener('click',()=>{this.st.viewSession=+el.dataset.bhsid;this.render()}));
  },

  async _renderDetail(v){

    if(!sess){this.st.viewSession=null;this.render();return}

    const opening=sess.status==='opening';
    const date=new Date(sess.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});

    let html='<div class="view-inner"><div class="view-header" style="display:flex;gap:var(--space-sm);align-items:center"><button class="btn btn-outline" id="bhBack" style="flex:0">← Retour</button><div style="flex:1"></div>';
    if(!closed)html+='<button class="btn btn-outline" id="bhEditSess" title="Modifier" style="flex:0;padding:8px 12px">✏️</button>';

    html+='<div class="bh-stats-grid">';
    html+='<div class="bh-stat"><div class="bh-stat-label">Dépôt</div><div class="bh-stat-value">'+fA(sess.deposit||0,c)+'</div></div>';

    if(sess.goalCount){

    /* Live opening stats */
    if(st.openedCount>0||opening||closed){

        html+='<div style="flex:1;padding:8px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius)"><div style="font-size:10px;color:var(--danger);font-weight:700">💩 FLOP</div><div style="font-weight:600;margin-top:2px">'+esc(st.worst.machine)+'</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)">'+st.worst.mult.toFixed(1)+'× · '+fA(st.worst.payout,c)+'</div></div>';

          html+='<div class="bh-bonus-payout"><input type="number" class="input bh-payout-inp" data-bid="'+b.id+'" placeholder="payout" min="0" step="0.01" inputmode="decimal"></div>';
